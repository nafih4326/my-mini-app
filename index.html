<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Extra Earn - Premium Real Blur Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000; 
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --blue: #3498db;
            --green: #2ecc71;
            --danger: #ff2a2a;
            --text-muted: #9ca3af;
            --blur-val: 20px;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), var(--green));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .user-info h4 {
            font-size: 15px;
            font-weight: 700;
        }

        .user-info p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .balance-card {
            margin: 20px;
            padding: 25px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(var(--blur-val));
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .balance-title {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 20px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn-action {
            padding: 12px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-action:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-action i {
            font-size: 18px;
            color: var(--blue);
        }

        .section {
            padding: 0 20px;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(var(--blur-val));
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(52, 152, 219, 0.1);
            color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .task-details h5 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .task-details p {
            font-size: 12px;
            color: var(--green);
            font-weight: 600;
        }

        .btn-claim {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            background: var(--blue);
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
        }

        /* Modal / Popup Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #111;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--green);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Nav Bar */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-item.active {
            color: var(--blue);
        }

        .nav-item i {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-profile">
            <div class="avatar" id="lbl-user-avatar">U</div>
            <div class="user-info">
                <h4 id="lbl-user-name">User Name</h4>
                <p>UID: <span id="lbl-user-uid">000000</span></p>
            </div>
        </div>
        <button class="btn-action" style="padding: 8px 12px;" onclick="copyUserUID()">
            <i class="fa-regular fa-copy"></i>
        </button>
    </div>

    <div class="balance-card">
        <div class="balance-title">Available Balance</div>
        <div class="balance-amount" id="lbl-balance">₹0.00</div>
        <div class="action-buttons">
            <button class="btn-action" onclick="openWithdrawModal()">
                <i class="fa-solid fa-wallet"></i> Withdraw
            </button>
            <button class="btn-action" onclick="openVoucherPopup()">
                <i class="fa-solid fa-ticket"></i> Voucher
            </button>
            <button class="btn-action" onclick="openModal('modal-refer')">
                <i class="fa-solid fa-user-plus"></i> Invite
            </button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">
            <span>Available Tasks</span>
        </div>
        <div id="tasks-container">
            <div class="task-card">
                <div class="task-info">
                    <div class="task-icon"><i class="fa-brands fa-telegram"></i></div>
                    <div class="task-details">
                        <h5>Join Telegram Channel</h5>
                        <p>+₹5.00</p>
                    </div>
                </div>
                <button class="btn-claim" onclick="alert('Task system active')">Start</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-withdraw">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Withdraw Funds</h3>
                <i class="fa-solid fa-xmark" onclick="closeModal('modal-withdraw')" style="cursor: pointer;"></i>
            </div>
            <div class="form-group">
                <label>UPI ID / Address</label>
                <input type="text" class="form-control" id="txt-wd-address" placeholder="example@upi">
            </div>
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" class="form-control" id="txt-wd-quantum" placeholder="100">
            </div>
            <button class="btn-submit" onclick="submitWithdrawal()">Submit Request</button>
        </div>
    </div>

    <div class="modal" id="modal-voucher">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Redeem Voucher</h3>
                <i class="fa-solid fa-xmark" onclick="closeModal('modal-voucher')" style="cursor: pointer;"></i>
            </div>
            <div class="form-group">
                <label>Voucher Code</label>
                <input type="text" class="form-control" id="txt-voucher-code" placeholder="ENTER CODE">
            </div>
            <button class="btn-submit" onclick="claimVoucherCode()">Redeem Now</button>
        </div>
    </div>

    <div class="modal" id="modal-refer">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Refer & Earn</h3>
                <i class="fa-solid fa-xmark" onclick="closeModal('modal-refer')" style="cursor: pointer;"></i>
            </div>
            <div class="form-group">
                <label>Your Referral Link</label>
                <input type="text" class="form-control" id="txt-refer-link-box" readonly>
            </div>
            <button class="btn-submit" onclick="copyReferLink()">Copy Link</button>
            <button class="btn-submit" style="background: var(--blue); margin-top: 8px;" onclick="shareReferTelegram()">Share on Telegram</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="openModal('modal-withdraw')">
            <i class="fa-solid fa-wallet"></i>
            <span>Wallet</span>
        </div>
        <div class="nav-item" onclick="openModal('modal-refer')">
            <i class="fa-solid fa-users"></i>
            <span>Friends</span>
        </div>
    </div>

    <script>
        // Automatic Dynamic API Link
        const ENGINE_API_ENDPOINT = window.location.origin;

        let sessionUserUid = null;
        const tg = window.Telegram ? window.Telegram.WebApp : null;

        if (tg) {
            tg.ready();
            tg.expand();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                sessionUserUid = tg.initDataUnsafe.user.id;
                document.getElementById('lbl-user-name').innerText = tg.initDataUnsafe.user.first_name || "User";
                document.getElementById('lbl-user-avatar').innerText = (tg.initDataUnsafe.user.first_name || "U")[0].toUpperCase();
            }
        }

        // Fallback for browser testing
        if (!sessionUserUid) {
            sessionUserUid = "501889840"; // Default / Test User ID
        }

        document.getElementById('lbl-user-uid').innerText = sessionUserUid;
        document.getElementById('txt-refer-link-box').value = `https://t.me/YourBotUsername?start=${sessionUserUid}`;

        function synchronizeTelemetryState() {
            if (!sessionUserUid) return;
            fetch(`${ENGINE_API_ENDPOINT}/api/mini-app/user/${sessionUserUid}`)
                .then(res => res.json())
                .then(data => {
                    if (data && !data.error) {
                        document.getElementById('lbl-balance').innerText = `₹${parseFloat(data.balance || 0).toFixed(2)}`;
                    }
                })
                .catch(err => console.error("Telemetry Sync Error:", err));
        }

        function submitWithdrawal() {
            const upi = document.getElementById('txt-wd-address').value;
            const amount = parseFloat(document.getElementById('txt-wd-quantum').value);

            if (!upi || !amount || amount <= 0) {
                alert("Please fill all withdrawal details accurately.");
                return;
            }

            fetch(`${ENGINE_API_ENDPOINT}/api/mini-app/withdraw`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: sessionUserUid, upi, amount })
            })
            .then(res => res.json())
            .then(r => { 
                if(r.error) {
                    alert(r.error); 
                } else { 
                    alert("Settlement Queued."); 
                    closeModal('modal-withdraw'); 
                    synchronizeTelemetryState(); 
                } 
            })
            .catch(err => alert("Server connection failed!"));
        }

        function claimVoucherCode() {
            const code = document.getElementById('txt-voucher-code').value;
            if (!code) return alert("Enter Voucher Code!");

            fetch(`${ENGINE_API_ENDPOINT}/api/mini-app/voucher`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: sessionUserUid, code })
            })
            .then(res => res.json())
            .then(r => {
                if(r.error) alert(r.error);
                else {
                    alert(r.message || "Voucher Claimed!");
                    closeModal('modal-voucher');
                    synchronizeTelemetryState();
                }
            })
            .catch(err => alert("Server connection failed!"));
        }

        function copyUserUID() { 
            navigator.clipboard.writeText(sessionUserUid); 
            alert("UID Copied."); 
        }

        function copyReferLink() { 
            navigator.clipboard.writeText(document.getElementById('txt-refer-link-box').value); 
            alert("Link Copied."); 
        }

        function shareReferTelegram() { 
            window.open(`https://t.me/share/url?url=${encodeURIComponent(document.getElementById('txt-refer-link-box').value)}&text=Join%20ExtraEarn%20Now`, '_blank'); 
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openVoucherPopup() { openModal('modal-voucher'); }
        function openWithdrawModal() { openModal('modal-withdraw'); }

        // Initial fetch on page load
        synchronizeTelemetryState();
    </script>
</body>
</html>
