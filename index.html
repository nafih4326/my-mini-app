<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EXTRA EARN - Ultra Suite Pro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
--bg-gradient: linear-gradient(135deg, #090b11 0%, #040508 100%);
--surface: #0e111a;
--surface-card: rgba(23, 26, 38, 0.6);
--panel-border: rgba(255, 255, 255, 0.07);
--accent-red: #ff2a33;
--accent-blue: #2563eb;
--text-white: #ffffff;
--text-muted: #9ca3af;
--success-green: #10b981;
--nav-bg: rgba(14, 17, 26, 0.25); 
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: '-apple-system', BlinkMacSystemFont, sans-serif; }
body { background: var(--bg-gradient); color: var(--text-white); min-height: 100vh; overflow: hidden; display: flex; justify-content: center; }

.app-container { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; position: relative; background: transparent; }
.main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; scrollbar-width: none; }
.main-content::-webkit-scrollbar { display: none; }

.view-section { display: none; }
.view-section.active { display: block; }

/* Dashboard Header & Banners */
.dashboard-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.user-profile-meta { display: flex; align-items: center; gap: 12px; }
.avatar-frame { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent-blue); overflow: hidden; background: #1a2035; }
.avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
.identity-lbl { font-size: 16px; font-weight: 700; color: var(--text-white); }
.status-badge { font-size: 11px; color: var(--success-green); background: rgba(16, 185, 129, 0.1); padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.2); }

.promo-banner-matrix { width: 100%; background: var(--surface-card); border: 1px solid var(--panel-border); border-radius: 16px; padding: 16px; margin-bottom: 20px; position: relative; overflow: hidden; }
.promo-banner-matrix::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%); pointer-events: none; }
.banner-headline { font-size: 18px; font-weight: 800; color: var(--text-white); margin-bottom: 4px; }
.banner-subline { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.4; }
.banner-action-btn { background: var(--accent-blue); color: var(--text-white); font-weight: 600; font-size: 13px; padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; }

/* Metrics Panels */
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.metric-card { background: var(--surface-card); border: 1px solid var(--panel-border); border-radius: 14px; padding: 14px; }
.metric-lbl { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-val { font-size: 22px; font-weight: 800; color: var(--text-white); }
.metric-val.currency::before { content: '₹'; margin-right: 2px; }

/* Micro Tasks Layout */
.section-title { font-size: 15px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.task-scroll-area { display: flex; flex-direction: column; gap: 10px; }
.task-item-card { background: var(--surface-card); border: 1px solid var(--panel-border); border-radius: 14px; padding: 14px; display: flex; align-items: center; justify-content: space-between; transition: border-color 0.2s; }
.task-item-card:active { border-color: var(--accent-blue); }
.task-info-block { display: flex; flex-direction: column; gap: 4px; }
.task-title-text { font-size: 14px; font-weight: 600; color: var(--text-white); }
.task-payout-amt { font-size: 13px; font-weight: 700; color: var(--success-green); }
.task-action-trigger { background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); color: var(--text-white); font-size: 12px; font-weight: 600; padding: 8px 14px; border-radius: 8px; cursor: pointer; }
.task-action-trigger.claimed { color: var(--text-muted); background: transparent; border-color: transparent; cursor: default; }

/* Navigation Systems */
.bottom-nav-bar { width: 100%; max-width: 480px; height: 74px; background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--panel-border); position: fixed; bottom: 0; display: grid; grid-template-columns: repeat(4, 1fr); align-items: center; justify-items: center; z-index: 100; }
.nav-tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); text-decoration: none; font-size: 11px; font-weight: 500; cursor: pointer; width: 100%; height: 100%; justify-content: center; }
.nav-tab-item.active { color: var(--accent-blue); }
.nav-icon { width: 22px; height: 22px; fill: currentColor; }

/* Overlay Popups */
.modal-view-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4,5,8,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: flex-end; }
.modal-view-overlay.active { display: flex; }
.popup-sheet-plate { width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--panel-border); border-radius: 24px 24px 0 0; padding: 24px; max-height: 85vh; overflow-y: auto; }
.popup-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.popup-title-text { font-size: 18px; font-weight: 700; }
.close-popup-icon { width: 24px; height: 24px; fill: var(--text-muted); cursor: pointer; }

/* Forms & Configuration Panels */
.input-group-block { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
.input-label-text { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
.form-input-field { background: rgba(255,255,255,0.03); border: 1px solid var(--panel-border); height: 48px; border-radius: 10px; padding: 0 14px; color: var(--text-white); font-size: 14px; width: 100%; }
.form-input-field:focus { outline: none; border-color: var(--accent-blue); }
.form-select-field { background: #0e111a; border: 1px solid var(--panel-border); height: 48px; border-radius: 10px; padding: 0 14px; color: var(--text-white); font-size: 14px; width: 100%; }
.submit-action-btn { width: 100%; height: 48px; background: var(--accent-blue); color: var(--text-white); font-weight: 600; border: none; border-radius: 10px; margin-top: 10px; cursor: pointer; font-size: 14px; }
.submit-action-btn.danger { background: var(--accent-red); }

/* Ledger History */
.ledger-item-card { background: rgba(255,255,255,0.02); border: 1px solid var(--panel-border); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.ledger-meta-info { display: flex; flex-direction: column; gap: 4px; }
.ledger-title-lbl { font-size: 13px; font-weight: 600; }
.ledger-date-stamp { font-size: 11px; color: var(--text-muted); }
.ledger-status-pill { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.ledger-status-pill.approved { background: rgba(16,185,129,0.1); color: var(--success-green); }
.ledger-status-pill.pending { background: rgba(245,158,11,0.1); color: #f59e0b; }
.ledger-status-pill.rejected { background: rgba(255,42,51,0.1); color: var(--accent-red); }

/* Message Template Styles */
.msg-template-box { background: rgba(255,255,255,0.02); border: 1px solid var(--panel-border); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
.msg-template-box textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border); border-radius: 6px; padding: 8px; color: #fff; font-size: 13px; resize: vertical; margin-top: 6px; min-height: 60px; }
</style>
</head>

<script>
const tgInstanceObj = window.Telegram.WebApp;
tgInstanceObj.ready();
tgInstanceObj.expand();

const activeGlobalUserId = tgInstanceObj.initDataUnsafe?.user?.id || 501889840;
const activeGlobalUsername = tgInstanceObj.initDataUnsafe?.user?.first_name || "Suite Alpha Developer";

const CORE_BACKEND_API_URL = window.location.origin;

let clientSideCachedState = null;

function syncPlatformData() {
    fetch(`${CORE_BACKEND_API_URL}/api/mini-app/sync`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeGlobalUserId, username: activeGlobalUsername })
    })
    .then(res => res.json())
    .then(data => {
        clientSideCachedState = data;
        renderUserDashboardInterface();
    })
    .catch(err => console.error("Matrix synchronization exception:", err));
}

function renderUserDashboardInterface() {
    if (!clientSideCachedState) return;
    
    const user = clientSideCachedState.user;
    const settings = clientSideCachedState.botSettings;

    // Profile Meta
    document.getElementById('user_display_name').innerText = user.name;
    document.getElementById('user_balance_lbl').innerText = parseFloat(user.balance).toFixed(2);
    document.getElementById('user_debt_lbl').innerText = parseFloat(user.debt || 0).toFixed(2);
    document.getElementById('total_invites_count').innerText = user.invites?.length || 0;
    document.getElementById('txtBotReferLink').value = `https://t.me/${settings.botUsername || 'bot'}?start=${user.id}`;
    
    if (clientSideCachedState.profilePic) {
        document.getElementById('user_avatar_img').src = clientSideCachedState.profilePic;
    }

    // Dynamic Admin Button Visibility
    if (parseInt(activeGlobalUserId) === parseInt(settings.masterAdminId || 501889840)) {
        document.getElementById('master_adm_btn').style.display = 'block';
    }

    // Dynamic Customized Banner Displays
    if (settings.customBanner) {
        document.getElementById('banner_headline_txt').innerText = settings.customBanner.headline || "Premium Hub";
        document.getElementById('banner_subline_txt').innerText = settings.customBanner.subline || "Tasks waiting.";
    }

    // Initialize Message Template inputs inside Admin View (if cached structure exists)
    if (settings.messages) {
        document.getElementById('tpl_msg_credit').value = settings.messages.adminCredit || "";
        document.getElementById('tpl_msg_debit').value = settings.messages.adminDebit || "";
        document.getElementById('tpl_msg_wd_pending').value = settings.messages.withdrawPending || "";
        document.getElementById('tpl_msg_wd_success').value = settings.messages.withdrawSuccess || "";
        document.getElementById('tpl_msg_wd_reject').value = settings.messages.withdrawReject || "";
    }

    // Map Micro Tasks Matrix
    const taskPanel = document.getElementById('tasks_wrapper_panel');
    taskPanel.innerHTML = "";
    
    if (settings.tasks && settings.tasks.length > 0) {
        settings.tasks.forEach(task => {
            const isCompleted = user.completedTasks?.includes(task.id);
            const card = document.createElement('div');
            card.className = "task-item-card";
            card.innerHTML = `
                <div class="task-info-block">
                    <div class="task-title-text">${task.title}</div>
                    <div class="task-payout-amt">₹${parseFloat(task.amount).toFixed(2)}</div>
                </div>
                ${isCompleted ? 
                    `<button class="task-action-trigger claimed" disabled>Claimed ✅</button>` : 
                    `<button class="task-action-trigger" onclick="claimMicroTaskPayout('${task.id}', '${task.link}')">Start Task</button>`
                }
            `;
            taskPanel.appendChild(card);
        });
    } else {
        taskPanel.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:20px;">No micro tasks assigned today.</div>`;
    }

    // Map Transaction Ledgers
    const ledgerPanel = document.getElementById('ledger_items_container');
    ledgerPanel.innerHTML = "";
    if (user.history && user.history.length > 0) {
        user.history.forEach(item => {
            const row = document.createElement('div');
            row.className = "ledger-item-card";
            
            if (typeof item === 'string') {
                row.innerHTML = `
                    <div class="ledger-meta-info">
                        <div class="ledger-title-lbl">${item}</div>
                        <div class="ledger-date-stamp">System Ledger Log</div>
                    </div>
                    <span class="ledger-status-pill approved">System</span>
                `;
            } else {
                const statusClass = (item.status || "").toLowerCase();
                row.innerHTML = `
                    <div class="ledger-meta-info">
                        <div class="ledger-title-lbl">${item.method || 'System Op'} - ${item.taskTitle || 'Assets Sync'}</div>
                        <div class="ledger-date-stamp">${item.date || 'Live Date'}</div>
                    </div>
                    <span class="ledger-status-pill ${statusClass}">${item.status || 'Approved'} - ₹${parseFloat(item.amount).toFixed(1)}</span>
                `;
            }
            ledgerPanel.appendChild(row);
        });
    } else {
        ledgerPanel.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:20px;">No ledgers transactions logged yet.</div>`;
    }
}

function switchApplicationView(viewTarget, element) {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab-item').forEach(t => t.classList.remove('active'));
    
    document.getElementById(`view_${viewTarget}`).classList.add('active');
    element.classList.add('active');
}

function openGiftCodeRedeemPopup() {
    document.getElementById('global_modal_overlay').classList.add('active');
    document.getElementById('sheet_gift_code').style.display = 'block';
    document.getElementById('sheet_admin_dashboard').style.display = 'none';
}

function openAdminDashboardView() {
    document.getElementById('global_modal_overlay').classList.add('active');
    document.getElementById('sheet_admin_dashboard').style.display = 'block';
    document.getElementById('sheet_gift_code').style.display = 'none';
}

function dismissModalOverlayLayer() {
    document.getElementById('global_modal_overlay').classList.remove('active');
}

function closeActiveModalWindow(event) {
    if (event.target.id === "global_modal_overlay") dismissModalOverlayLayer();
}

function switchAdminSubTab(subTabId) {
    document.querySelectorAll('.adm-subtab-section').forEach(s => s.style.display = 'none');
    document.getElementById(`adm_subtab_${subTabId}`).style.display = 'block';
    
    document.querySelectorAll('#sheet_admin_dashboard .banner-action-btn').forEach(b => {
        if(b.id.startsWith('tab_btn_')) b.style.background = '#1e293b';
    });
    document.getElementById(`tab_btn_${subTabId}`).style.background = 'var(--accent-blue)';
}

/* ================= WEB APP CORE API ACTIONS ================= */

function claimMicroTaskPayout(taskId, link) {
    if(link && link !== '#') window.open(link, '_blank');
    
    fetch(`${CORE_BACKEND_API_URL}/api/mini-app/claim-task`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeGlobalUserId, taskId: taskId })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success) alert("Task verified and reward credited!");
        syncPlatformData();
    });
}

function executePeerToPeerAssetTransfer() {
    const targetUid = parseInt(document.getElementById('p2p_recipient_uid').value);
    const amount = parseFloat(document.getElementById('p2p_transfer_amount').value);
    
    if(!targetUid || isNaN(amount) || amount <= 0) return alert("Please specify valid values.");
    
    fetch(`${CORE_BACKEND_API_URL}/api/mini-app/peer-transfer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeGlobalUserId, targetUid: targetUid, amount: amount })
    })
    .then(res => {
        if(!res.ok) return res.json().then(e => { throw new Error(e.error); });
        return res.json();
    })
    .then(() => {
        alert("P2P Asset Transfer Completed!");
        document.getElementById('p2p_recipient_uid').value = "";
        document.getElementById('p2p_transfer_amount').value = "";
        syncPlatformData();
    })
    .catch(err => alert("Transfer Error: " + err.message));
}

function submitWithdrawalPayoutRequest() {
    const address = document.getElementById('withdrawal_upi_address').value.trim();
    const amount = parseFloat(document.getElementById('withdrawal_payout_amount').value);
    
    if(!address || isNaN(amount) || amount <= 0) return alert("Verify gateway values.");
    
    fetch(`${CORE_BACKEND_API_URL}/api/mini-app/withdraw`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeGlobalUserId, address: address, amount: amount, method: "UPI" })
    })
    .then(res => {
        if(!res.ok) return res.json().then(e => { throw new Error(e.error); });
        return res.json();
    })
    .then(() => {
        alert("Cashout Request Transmitted!");
        document.getElementById('withdrawal_payout_amount').value = "";
        syncPlatformData();
    })
    .catch(err => alert("Gateway Error: " + err.message));
}

function claimPlatformGiftCode() {
    const code = document.getElementById('walletGiftCodeInput').value.trim().toUpperCase();
    if(!code) return alert("Voucher string missing.");

    fetch(`${CORE_BACKEND_API_URL}/api/mini-app/redeem-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeGlobalUserId, code: code })
    })
    .then(res => {
        if(!res.ok) return res.json().then(e => { throw new Error(e.error); });
        return res.json();
    })
    .then(() => {
        alert("Voucher Asset Credited!");
        document.getElementById('walletGiftCodeInput').value = "";
        dismissModalOverlayLayer();
        syncPlatformData();
    })
    .catch(err => alert("Voucher Exception: " + err.message));
}

/* ================= ADMIN MANAGEMENT INTERFACE CORE ACTIONS ================= */

function executeAdminBalanceOverride() {
    const targetUid = document.getElementById('admBalanceTargetUid').value.trim();
    const action = document.getElementById('admBalanceAction').value;
    const amount = parseFloat(document.getElementById('admBalanceAmount').value);
    
    if (!targetUid || isNaN(amount) || amount <= 0) return alert("Enter accurate metrics properties.");

    let operationAction = action;
    let targetIsDebt = false;

    if (action === "add_debt") {
        operationAction = "add";
        targetIsDebt = true;
    } else if (action === "remove_debt") {
        operationAction = "remove";
        targetIsDebt = true;
    }

    fetch(`${CORE_BACKEND_API_URL}/api/admin/modify-balance`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ targetUid: targetUid, action: operationAction, amount: amount, isDebt: targetIsDebt })
    })
    .then(res => {
        if(!res.ok) throw new Error("Synchronization failure.");
        return res.json();
    })
    .then(() => {
        alert("User Assets Balance Adjusted Successfully!");
        document.getElementById('admBalanceAmount').value = "";
        dismissModalOverlayLayer();
        syncPlatformData();
    })
    .catch(err => alert(err.message));
}

function executeAdminTaskDeployment() {
    const title = document.getElementById('adm_task_title').value.trim();
    const payout = document.getElementById('adm_task_payout').value;
    const link = document.getElementById('adm_task_url').value.trim();

    if(!title || !payout) return alert("Provide metadata specs.");

    const generatedTaskId = "tk_" + Date.now();
    const activeTasksList = [...(clientSideCachedState?.botSettings?.tasks || [])];
    activeTasksList.push({ id: generatedTaskId, title: title, amount: payout, link: link || "#" });

    fetch(`${CORE_BACKEND_API_URL}/api/settings/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tasks: activeTasksList })
    }).then(() => {
        alert("Micro Task Campaign Deployed!");
        document.getElementById('adm_task_title').value = "";
        document.getElementById('adm_task_payout').value = "";
        document.getElementById('adm_task_url').value = "";
        dismissModalOverlayLayer();
        syncPlatformData();
    });
}

function executeAdminPromoCodeGeneration() {
    const code = document.getElementById('adm_promo_string').value.trim().toUpperCase();
    const amount = document.getElementById('adm_promo_amount').value;

    if(!code || !amount) return alert("Missing Voucher details.");

    fetch(`${CORE_BACKEND_API_URL}/api/admin/create-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ codeString: code, awardValue: amount })
    }).then(() => {
        alert("Voucher Gift Token Minted!");
        document.getElementById('adm_promo_string').value = "";
        document.getElementById('adm_promo_amount').value = "";
        dismissModalOverlayLayer();
        syncPlatformData();
    });
}

function saveActiveAdminBannerSettings() {
    const head = document.getElementById('adm_banner_head').value.trim();
    const sub = document.getElementById('adm_banner_sub').value.trim();
    
    if(!head) return alert("Headline missing.");
    const customBannerObj = { headline: head, subline: sub };
    
    fetch(`${CORE_BACKEND_API_URL}/api/settings/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ customBanner: customBannerObj })
    }).then(() => {
        alert("Global Dashboard Banner Saved!");
        dismissModalOverlayLayer();
        syncPlatformData();
    });
}

function removeActiveAdminBanner() {
    const customBannerObj = { headline: "Premium Dashboard", subline: "Complete micro tasks to earn assets instantly." };
    fetch(`${CORE_BACKEND_API_URL}/api/settings/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ customBanner: customBannerObj })
    }).then(() => {
        alert("Active Banner successfully uninstalled.");
        dismissModalOverlayLayer();
        syncPlatformData();
    });
}

function saveGlobalMessageTemplates() {
    const activeMessagesObj = { ...(clientSideCachedState?.botSettings?.messages || {}) };
    
    activeMessagesObj.adminCredit = document.getElementById('tpl_msg_credit').value;
    activeMessagesObj.adminDebit = document.getElementById('tpl_msg_debit').value;
    activeMessagesObj.withdrawPending = document.getElementById('tpl_msg_wd_pending').value;
    activeMessagesObj.withdrawSuccess = document.getElementById('tpl_msg_wd_success').value;
    activeMessagesObj.withdrawReject = document.getElementById('tpl_msg_wd_reject').value;

    fetch(`${CORE_BACKEND_API_URL}/api/settings/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: activeMessagesObj })
    }).then(() => {
        alert("Message Templates Matrix Saved Successfully!");
        dismissModalOverlayLayer();
        syncPlatformData();
    });
}

function copyPartnerBotLink() {
    navigator.clipboard.writeText(document.getElementById('txtBotReferLink').value).then(() => alert("Saved to memory!"));
}
function sharePartnerBotLink() {
    window.open(`https://t.me/share/url?url=${encodeURIComponent(document.getElementById('txtBotReferLink').value)}`, '_blank');
}

// Initial Core Data Pull
syncPlatformData();
