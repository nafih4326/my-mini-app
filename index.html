<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard & Premium Glass Navigation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* അടിസ്ഥാന ക്രമീകരണങ്ങൾ - ബാക്ക്ഗ്രൗണ്ട് ക്ലീൻ ആയി സൂക്ഷിച്ചിരിക്കുന്നു */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        header {
            background: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* അഡ്മിൻ ഫീച്ചർ കാർഡുകൾ */
        .admin-panel {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .admin-panel.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 15px;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #2980b9;
        }

        /* 💎 പ്രീമിയം ഗ്ലാസ് വാട്ടർ ഇഫക്റ്റും ലെൻസ് ഫീച്ചറുമുള്ള ബോട്ടം നാവിഗേഷൻ ബാർ */
        .bottom-nav-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 450px;
            z-index: 1000;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            /* ഗ്ലാസ്മോർഫിസം & വാട്ടർ എഫക്റ്റ് */
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 10px 5px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15), 
                        inset 0 0 10px rgba(255, 255, 255, 0.6); /* വെള്ളത്തിന്റെ തിളക്കം നൽകാൻ */
            position: relative;
            overflow: visible;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 60px;
            height: 50px;
            justify-content: center;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 2px;
            transition: transform 0.3s, color 0.3s;
        }

        /* 🔍 മാഗ്നിഫയിംഗ് ലെൻസ് കാർഡ് ഇഫക്റ്റ് (Active State) */
        .nav-item.active {
            color: #1abc9c;
            transform: translateY(-12px) scale(1.25); /* ലെൻസ് പോലെ വലുതായി പൊങ്ങി നിൽക്കുന്നു */
        }

        .nav-item.active i {
            color: #1abc9c;
            text-shadow: 0 4px 10px rgba(26, 188, 156, 0.3);
        }

        /* ബാക്ക്ഗ്രൗണ്ടിൽ മൂവ് ചെയ്യുന്ന വാട്ടർ ഡ്രോപ്പ് / ലെൻസ് ഇൻഡിക്കേറ്റർ */
        .lens-indicator {
            position: absolute;
            top: -10px;
            height: 65px;
            width: 65px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            z-index: 1;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1), 
                        inset 0 0 8px rgba(255,255,255,0.8);
            border: 1px solid rgba(255, 255, 255, 0.6);
            pointer-events: none;
            display: none; /* ആദ്യ സെലക്ഷനിൽ JS വഴി ഓണാക്കും */
        }
    </style>
</head>
<body>

    <header>
        <h1>അഡ്മിൻ കൺട്രോൾ പാനൽ</h1>
    </header>

    <div class="container">
        <div id="settings" class="admin-panel active">
            <h2><i class="fas fa-cogs"></i> ബോട്ട് സെറ്റിംഗ്സ്</h2>
            <div class="form-group">
                <label>മിനിമം പിൻവലിക്കൽ തുക (Min Withdraw)</label>
                <input type="number" id="minWithdraw" value="1">
            </div>
            <div class="form-group">
                <label>മാക്സിമം പിൻവലിക്കൽ തുക (Max Withdraw)</label>
                <input type="number" id="maxWithdraw" value="500">
            </div>
            <div class="form-group">
                <label>റഫറൽ ബോണസ് (Per Refer)</label>
                <input type="number" id="perRefer" value="7.00">
            </div>
            <button onclick="updateSettings()">സെറ്റിംഗ്സ് അപ്ഡേറ്റ് ചെയ്യുക</button>
        </div>

        <div id="codes" class="admin-panel">
            <h2><i class="fas fa-gift"></i> സ്പെഷ്യൽ കോഡ് നിർമ്മിക്കുക</h2>
            <div class="form-group">
                <label>കോഡ് നാമം (Promo Code)</label>
                <input type="text" id="codeString" placeholder="ഉദാഹരണത്തിന്: WELCOME50">
            </div>
            <div class="form-group">
                <label>സമ്മാന തുക (Award Amount)</label>
                <input type="number" id="awardValue" placeholder="10">
            </div>
            <button onclick="createCode()">കോഡ് നിർമ്മിക്കുക</button>
        </div>

        <div id="tasks" class="admin-panel">
            <h2><i class="fas fa-tasks"></i> പുതിയ ടാസ്ക് നൽകുക</h2>
            <div class="form-group">
                <label>ടാസ്ക് ടൈറ്റിൽ</label>
                <input type="text" placeholder="യൂട്യൂബ് ചാനൽ സബ്സ്ക്രൈബ് ചെയ്യുക">
            </div>
            <div class="form-group">
                <label>ടാസ്ക് റിവാർഡ് തുക</label>
                <input type="number" placeholder="5">
            </div>
            <button onclick="alert('ടാസ്ക് സേവ് ചെയ്തു!')">ടാസ്ക് ആഡ് ചെയ്യുക</button>
        </div>

        <div id="users" class="admin-panel">
            <h2><i class="fas fa-users"></i> ഉപയോക്താക്കളുടെ ലിസ്റ്റ്</h2>
            <p>യൂസർമാരുടെ വിവരങ്ങളും അവരുടെ ബാലൻസും ഇവിടെ കാണാം...</p>
        </div>
    </div>

    <div class="bottom-nav-container">
        <div class="bottom-nav">
            <div class="lens-indicator" id="lens"></div>
            
            <div class="nav-item active" onclick="switchTab(this, 'settings', 0)">
                <i class="fas fa-sliders-h"></i>
                <span>സെറ്റിംഗ്സ്</span>
            </div>
            <div class="nav-item" onclick="switchTab(this, 'codes', 1)">
                <i class="fas fa-qrcode"></i>
                <span>കോഡുകൾ</span>
            </div>
            <div class="nav-item" onclick="switchTab(this, 'tasks', 2)">
                <i class="fas fa-tasks"></i>
                <span>ടാസ്കുകൾ</span>
            </div>
            <div class="nav-item" onclick="switchTab(this, 'users', 3)">
                <i class="fas fa-user-shield"></i>
                <span>അഡ്മിൻ</span>
            </div>
        </div>
    </div>

    <script>
        // ടാബുകൾ മാറുന്നതിനും ലെൻസ് ആനിമേഷനും വേണ്ടിയുള്ള കോഡ്
        function switchTab(element, tabId, index) {
            // എല്ലാ പാനലുകളും ഒളിപ്പിക്കുക
            document.querySelectorAll('.admin-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            // ആവശ്യമായ പാനൽ മാത്രം കാണിക്കുക
            document.getElementById(tabId).classList.add('active');

            // ആക്റ്റീവ് ക്ലാസ് മാറ്റുക
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');

            // 🔍 ലെൻസ് (വാട്ടർ ഡ്രോപ്പ്) ഇഫക്റ്റ് പൊസിഷൻ നീക്കുക
            const lens = document.getElementById('lens');
            lens.style.display = 'block';
            
            // ഓരോ ബട്ടണിന്റെയും പൊസിഷൻ കണക്കാക്കി ലെൻസ് അങ്ങോട്ട് നീക്കുന്നു
            const totalItems = document.querySelectorAll('.nav-item').length;
            const containerWidth = document.querySelector('.bottom-nav').clientWidth;
            const itemWidth = containerWidth / totalItems;
            
            // ലെൻസ് കൃത്യം നടുവിലായി വരാൻ
            const leftPosition = (itemWidth * index) + (itemWidth / 2) - 32.5; 
            lens.style.left = leftPosition + 'px';
        }

        // പേജ് ലോഡാകുമ്പോൾ ആദ്യത്തെ ലെൻസ് പൊസിഷൻ സെറ്റ് ചെയ്യാൻ
        window.onload = function() {
            setTimeout(() => {
                switchTab(document.querySelectorAll('.nav-item')[0], 'settings', 0);
            }, 300);
        };

        // API അപ്ഡേറ്റുകൾ (സെറ്റിംഗ്സ് ബാക്ക് എൻഡിലേക്ക് അയക്കാൻ)
        function updateSettings() {
            const minW = document.getElementById('minWithdraw').value;
            const maxW = document.getElementById('maxWithdraw').value;
            const perR = document.getElementById('perRefer').value;

            fetch('/api/settings/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ minWithdraw: parseFloat(minW), maxWithdraw: parseFloat(maxW), perRefer: parseFloat(perR) })
            })
            .then(res => res.json())
            .then(data => { if(data.success) alert('ബോട്ട് സെറ്റിംഗ്സ് വിജയകരമായി പുതുക്കി!'); })
            .catch(err => console.error(err));
        }

        // പ്രൊമോ കോഡ് നിർമ്മിക്കാനുള്ള ഫങ്ക്ഷൻ
        function createCode() {
            const codeStr = document.getElementById('codeString').value;
            const awardVal = document.getElementById('awardValue').value;

            fetch('/api/admin/create-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ codeString: codeStr, awardValue: awardVal })
            })
            .then(res => res.json())
            .then(data => { if(data.success) alert('സ്പെഷ്യൽ കോഡ് വിജയകരമായി ക്രിയേറ്റ് ചെയ്തു!'); })
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
