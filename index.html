<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EXTRA EARN</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --bg-gradient: linear-gradient(135deg, #090b11 0%, #040508 100%);
    --surface: #0e111a;
    --surface-card: rgba(23, 26, 38, 0.6);
    --panel-border: rgba(255, 255, 255, 0.07);
    --accent-blue: #2563eb;
    --accent-red: #ef4444;
    --text-white: #ffffff;
    --text-muted: #9ca3af;
    --success-green: #10b981;
    --danger-red: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: '-apple-system', BlinkMacSystemFont, sans-serif; user-select: none; }
body { background: var(--bg-gradient); color: var(--text-white); min-height: 100vh; display: flex; justify-content: center; overflow-x: hidden; }

.app-container { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; position: relative; background: #05070c; }

/* Dynamic Header Area */
.app-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(14, 17, 26, 0.9); border-bottom: 1px solid var(--panel-border); }
.logo-text { font-size: 20px; font-weight: 800; letter-spacing: 0.5px; }
.logo-extra { color: var(--accent-red); }
.logo-earn { color: var(--text-white); }

.header-right { display: flex; align-items: center; gap: 12px; }
.header-balance-box { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--panel-border); font-weight: 700; color: var(--success-green); font-size: 14px; display: flex; align-items: center; gap: 5px; }
.profile-avatar { width: 35px; height: 35px; border-radius: 50%; background: #2563eb; border: 1px solid rgba(255,255,255,0.2); object-fit: cover; }

.view-section { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; display: none; }
.view-section.active { display: block; }

/* Bottom Menu Bar with Elegant Icons */
.bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(14, 17, 26, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--panel-border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
.nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: 0.3s; gap: 4px; }
.nav-item i { font-size: 20px; }
.nav-item.active { color: var(--accent-blue); text-shadow: 0 0 10px rgba(37,99,235,0.3); }

/* Banners */
.banner-container { width: 100%; height: 150px; border-radius: 16px; overflow: hidden; margin-bottom: 20px; display: none; background: var(--surface-card); border: 1px solid var(--panel-border); }
.banner-container img { width: 100%; height: 100%; object-fit: cover; }

/* Task Items */
.task-list { display: flex; flex-direction: column; gap: 12px; }
.task-card { background: var(--surface-card); border: 1px solid var(--panel-border); border-radius: 14px; padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.task-details-left { display: flex; flex-direction: column; gap: 4px; }
.task-title { font-size: 15px; font-weight: 600; color: #fff; }
.task-amount { font-size: 16px; font-weight: 700; color: var(--success-green); }

/* Wallet Element Cards */
.balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid var(--panel-border); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
.balance-header { display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
.balance-value { font-size: 34px; font-weight: 800; color: #fff; }

.upi-btn { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }

/* Overlay Popups */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-content { background: var(--surface); border: 1px solid var(--panel-border); width: 100%; max-width: 400px; border-radius: 20px; padding: 24px; position: relative; }
.modal-close { position: absolute; top: 15px; right: 15px; color: var(--text-muted); font-size: 20px; cursor: pointer; }

.input-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
.input-field { background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); padding: 14px; border-radius: 10px; color: white; font-size: 15px; width: 100%; outline: none; }

/* Biometric Sensor Area */
.fingerprint-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 65vh; gap: 20px; }
.fp-icon { font-size: 65px; color: var(--accent-blue); animation: pulse 2s infinite; cursor: pointer; }
@keyframes pulse { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.7; } }

/* Admin Panels */
.admin-nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; }
.admin-nav-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); color: var(--text-muted); border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.admin-nav-btn.active { background: var(--accent-blue); color: white; }
.admin-panel-section { display: none; }
.admin-panel-section.active { display: block; }
</style>
</head>
<body>

<div class="app-container">

    <div class="app-header">
        <div class="logo-text">
            <span class="logo-extra">Extra</span> <span class="logo-earn">Earn</span>
        </div>
        <div class="header-right">
            <div class="header-balance-box">
                <i class="fas fa-wallet"></i> ₹<span id="header-balance-num">0.00</span>
            </div>
            <img id="header-user-avatar" class="profile-avatar" src="https://img.icons8.com/colors/344/test-account.png">
        </div>
    </div>

    <div id="view-home" class="view-section active">
        <div id="home-banner" class="banner-container"></div>
        <div id="home-task-list" class="task-list"></div>
    </div>

    <div id="view-wallet" class="view-section">
        <div class="balance-card">
            <div class="balance-header">
                <span><i class="fas fa-wallet"></i> Available Balance</span>
                <span id="user-debt-indicator" style="color:var(--accent-red); font-weight:bold; display:none;"><i class="fas fa-hand-holding-dollar"></i> Debt: ₹<span id="user-debt-value">0</span></span>
            </div>
            <div class="balance-value">₹<span id="wallet-balance-num">0.00</span></div>
        </div>
        
        <button class="upi-btn" onclick="openWithdrawModal()">
            <i class="fas fa-money-check-alt"></i> Withdraw Payout
        </button>

        <div class="input-group" style="margin-top:20px;">
            <input type="text" id="gift-code-field" class="input-field" placeholder="Enter Gift Code here...">
            <button class="upi-btn" style="background:var(--success-green);" onclick="claimGiftCodeAction()">
                <i class="fas fa-gift"></i> Redeem Gift Code
            </button>
        </div>
    </div>

    <div id="view-pay" class="view-section">
        <h3><i class="fas fa-paper-plane"></i> Peer-to-Peer Pay</h3><br>
        <div class="input-group">
            <label><i class="fas fa-user"></i> Target User ID</label>
            <input type="number" id="pay-target-uid" class="input-field" placeholder="Recipient ID">
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-indian-rupee-sign"></i> Amount</label>
            <input type="number" id="pay-amount" class="input-field" placeholder="0.00">
        </div>
        <button class="upi-btn" style="background:var(--success-green);" onclick="sendPeerFunds()">
            <i class="fas fa-check-circle"></i> Transfer Balance
        </button>
    </div>

    <div id="view-profile" class="view-section">
        <div style="background: var(--surface-card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--panel-border);">
            <img id="main-profile-pic" src="" style="width:75px; height:75px; border-radius:50%; border:2px solid var(--accent-blue); margin-bottom:10px;">
            <h4 id="prof-name">User Account</h4>
            <p style="color:var(--text-muted); font-size:13px; margin-top:5px;">ID: <span id="prof-id">-</span></p>
        </div>
        
        <div id="admin-entry-zone" style="display:none; margin-top:20px;">
            <button class="upi-btn" style="background:#4b5563;" onclick="openAdminGate()">
                <i class="fas fa-user-shield"></i> Open Control Gate
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchMainTab('home', this)"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="switchMainTab('wallet', this)"><i class="fas fa-wallet"></i>Wallet</div>
        <div class="nav-item" onclick="switchMainTab('pay', this)"><i class="fas fa-paper-plane"></i>Pay</div>
        <div class="nav-item" onclick="switchMainTab('profile', this)"><i class="fas fa-user"></i>Profile</div>
    </div>

</div>

<div id="modal-task-detail" class="modal-overlay">
    <div class="modal-content">
        <i class="fas fa-times modal-close" onclick="closeModal('modal-task-detail')"></i>
        <h3 id="md-task-title">-</h3>
        <p style="color:var(--success-green); font-weight:700; margin:10px 0; font-size:18px;">Reward: ₹<span id="md-task-amt">0</span></p>
        <div id="md-task-desc" style="background:rgba(255,255,255,0.03); padding:10px; border-radius:8px; font-size:13px; margin-bottom:15px; color:var(--text-muted);">-</div>
        
        <button class="upi-btn" id="md-task-link-btn" style="background:#6366f1;">
            <i class="fas fa-external-link-alt"></i> Open Task Link
        </button>

        <div id="proof-upload-zone">
            <div class="input-group">
                <label><i class="fas fa-image"></i> Submit Screenshots Verification Proof</label>
                <input type="file" id="md-task-file" class="input-field" accept="image/*">
            </div>
            <button class="upi-btn" onclick="uploadTaskProofData()"><i class="fas fa-cloud-upload-alt"></i> Upload Proof</button>
        </div>
        <div id="md-already-processed" style="display:none; text-align:center; color:var(--success-green); font-weight:600;">
            <i class="fas fa-check-circle"></i> Verification Logs Registered.
        </div>
    </div>
</div>

<div id="modal-withdraw" class="modal-overlay">
    <div class="modal-content">
        <i class="fas fa-times modal-close" onclick="closeModal('modal-withdraw')"></i>
        <h3><i class="fas fa-money-bill-transfer"></i> UPI Payout</h3><br>
        <div class="input-group">
            <label>UPI ID Address</label>
            <input type="text" id="wd-upi-id" class="input-field" placeholder="name@upi">
        </div>
        <div class="input-group">
            <label>Payout Amount (₹)</label>
            <input type="number" id="wd-amount" class="input-field" placeholder="0.00">
        </div>
        <button class="upi-btn" onclick="executeWithdrawalRequest()"><i class="fas fa-check"></i> Request Payout</button>
    </div>
</div>

<div id="modal-admin-gate" class="modal-overlay">
    <div class="modal-content" style="max-width: 450px; height: 90vh; overflow-y: auto;">
        <i class="fas fa-times modal-close" onclick="closeModal('modal-admin-gate')"></i>
        
        <div id="admin-lock-screen" class="fingerprint-screen">
            <i class="fas fa-fingerprint fp-icon" onclick="triggerNativeBiometricAuth()"></i>
            <p style="color: var(--text-muted); font-weight:600;">Scan Device Fingerprint Sensor</p>
        </div>

        <div id="admin-dashboard-panel" style="display:none;">
            <h3 style="margin-bottom:15px;"><i class="fas fa-user-shield"></i> System Control Panel</h3>
            <div class="admin-nav">
                <button class="admin-nav-btn active" onclick="switchAdminPanelSection('banners', this)">Banners</button>
                <button class="admin-nav-btn" onclick="switchAdminPanelSection('tasks', this)">Tasks</button>
                <button class="admin-nav-btn" onclick="switchAdminPanelSection('proofs', this)">Proofs Box</button>
                <button class="admin-nav-btn" onclick="switchAdminPanelSection('codes', this)">Codes Engine</button>
            </div>

            <div id="ad-sec-banners" class="admin-panel-section active">
                <div class="input-group">
                    <label>Upload Banner File</label>
                    <input type="file" id="ad-banner-file" class="input-field" accept="image/*">
                </div>
                <button class="upi-btn" onclick="saveAdminBanner()"><i class="fas fa-plus"></i> Add Global Banner</button>
                <div id="ad-banner-list"></div>
            </div>

            <div id="ad-sec-tasks" class="admin-panel-section">
                <div class="input-group">
                    <label>Task Header</label>
                    <input type="text" id="ad-task-title" class="input-field">
                </div>
                <div class="input-group">
                    <label>Reward Payout (₹)</label>
                    <input type="number" id="ad-task-amt" class="input-field">
                </div>
                <div class="input-group">
                    <label>Target URL Link</label>
                    <input type="text" id="ad-task-url" class="input-field">
                </div>
                <div class="input-group">
                    <label>Directions/Instructions</label>
                    <textarea id="ad-task-desc" class="input-field" style="height:60px;"></textarea>
                </div>
                <button class="upi-btn" onclick="publishAdminTask()"><i class="fas fa-bullhorn"></i> Deploy Task</button>
            </div>

            <div id="ad-sec-proofs" class="admin-panel-section">
                <div id="ad-proofs-container" style="display:flex; flex-direction:column; gap:10px;"></div>
            </div>

            <div id="ad-sec-codes" class="admin-panel-section">
                <div class="input-group">
                    <label>Custom Gift Code String</label>
                    <input type="text" id="ad-code-string" class="input-field" placeholder="EXTRA50">
                </div>
                <div class="input-group">
                    <label>Award Payout (₹)</label>
                    <input type="number" id="ad-code-value" class="input-field" placeholder="50">
                </div>
                <button class="upi-btn" onclick="createSystemGiftCode()"><i class="fas fa-save"></i> Generate Code</button>
            </div>
        </div>
    </div>
</div>

<script>
const BACKEND_API = window.location.origin;
let tg = window.Telegram.WebApp;
tg.expand();

let activeUid = tg.initDataUnsafe?.user?.id || 501889840;
let activeUname = tg.initDataUnsafe?.user?.first_name || "Premium User";
let userPhoto = tg.initDataUnsafe?.user?.photo_url || "https://img.icons8.com/colors/344/test-account.png";

let currentSystemState = {};
let selectedActiveTaskId = null;

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById('prof-id').innerText = activeUid;
    document.getElementById('prof-name').innerText = activeUname;
    document.getElementById('header-user-avatar').src = userPhoto;
    document.getElementById('main-profile-pic').src = userPhoto;
    syncAppDataCycle();
});

function syncAppDataCycle() {
    fetch(`${BACKEND_API}/api/settings`)
        .then(res => res.json())
        .then(data => {
            currentSystemState = data.botSettings;
            const users = data.usersDatabase;

            if (activeUid == 501889840 || currentSystemState.subAdmins?.includes(Number(activeUid))) {
                document.getElementById('admin-entry-zone').style.display = 'block';
            }

            if (!users[activeUid]) {
                fetch(`${BACKEND_API}/api/mini-app/sync-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeUid, name: activeUname })
                }).then(() => syncAppDataCycle());
                return;
            }

            const me = users[activeUid];
            document.getElementById('header-balance-num').innerText = parseFloat(me.balance).toFixed(2);
            document.getElementById('wallet-balance-num').innerText = parseFloat(me.balance).toFixed(2);

            if (me.debt > 0) {
                document.getElementById('user-debt-indicator').style.display = 'inline';
                document.getElementById('user-debt-value').innerText = me.debt;
            } else {
                document.getElementById('user-debt-indicator').style.display = 'none';
            }

            renderInterfaceBanners(currentSystemState.banners || []);
            renderInterfaceTasks(currentSystemState.tasks || [], me.completedTasks || [], currentSystemState.pendingProofs || {});
            renderAdminViewLogs(currentSystemState);
        });
}

function switchMainTab(target, element) {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`view-${target}`).classList.add('active');
    element.classList.add('active');
}

function renderInterfaceBanners(banners) {
    const box = document.getElementById('home-banner');
    if (banners.length === 0) box.style.display = 'none';
    else { box.style.display = 'block'; box.innerHTML = `<img src="${banners[0]}">`; }
}

function renderInterfaceTasks(tasks, completed, pending) {
    const container = document.getElementById('home-task-list');
    container.innerHTML = '';
    tasks.forEach(t => {
        let textMeta = "";
        if (completed.includes(t.id)) textMeta = `<span style="color:var(--success-green); font-size:11px;">(Completed)</span>`;
        
        const card = document.createElement('div');
        card.className = 'task-card';
        card.onclick = () => openTaskDetailsPopup(t, completed, pending);
        card.innerHTML = `
            <div class="task-details-left">
                <span class="task-title"><i class="fas fa-thumbtack" style="color:var(--accent-blue); margin-right:6px;"></i> ${t.title} ${textMeta}</span>
            </div>
            <div class="task-amount">₹${t.amount}</div>
        `;
        container.appendChild(card);
    });
}

function openTaskDetailsPopup(task, completed, pending) {
    selectedActiveTaskId = task.id;
    document.getElementById('md-task-title').innerText = task.title;
    document.getElementById('md-task-amt').innerText = task.amount;
    document.getElementById('md-task-desc').innerText = task.desc || "Complete steps to earn rewards.";
    document.getElementById('md-task-link-btn').onclick = () => window.open(task.url, '_blank');

    const key = `${activeUid}_${task.id}`;
    if (completed.includes(task.id) || pending[key]) {
        document.getElementById('proof-upload-zone').style.display = 'none';
        document.getElementById('md-already-processed').style.display = 'block';
    } else {
        document.getElementById('proof-upload-zone').style.display = 'block';
        document.getElementById('md-already-processed').style.display = 'none';
    }
    document.getElementById('modal-task-detail').style.display = 'flex';
}

function uploadTaskProofData() {
    const file = document.getElementById('md-task-file').files[0];
    if (!file) return alert("Proof screenshot required.");
    const reader = new FileReader();
    reader.onload = function(e) {
        fetch(`${BACKEND_API}/api/mini-app/submit-proof`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: activeUid, taskId: selectedActiveTaskId, proofImg: e.target.result })
        }).then(() => { alert("Proof submitted."); closeModal('modal-task-detail'); syncAppDataCycle(); });
    };
    reader.readAsDataURL(file);
}

function claimGiftCodeAction() {
    const code = document.getElementById('gift-code-field').value.trim();
    if(!code) return;
    fetch(`${BACKEND_API}/api/mini-app/redeem-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeUid, code: code })
    }).then(res => res.json()).then(res => {
        if(res.error) alert(res.error);
        else { alert(`Success! Received ₹${res.amount}`); syncAppDataCycle(); }
    });
}

function openWithdrawModal() { document.getElementById('modal-withdraw').style.display = 'flex'; }

function executeWithdrawalRequest() {
    const upi = document.getElementById('wd-upi-id').value.trim();
    const amt = parseFloat(document.getElementById('wd-amount').value);
    fetch(`${BACKEND_API}/api/mini-app/withdraw`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeUid, upi, amount: amt })
    }).then(res => res.json()).then(res => {
        if(res.error) alert(res.error);
        else { alert("Payout request queued."); closeModal('modal-withdraw'); syncAppDataCycle(); }
    });
}

function sendPeerFunds() {
    const target = document.getElementById('pay-target-uid').value.trim();
    const amt = parseFloat(document.getElementById('pay-amount').value);
    fetch(`${BACKEND_API}/api/mini-app/peer-transfer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sourceId: activeUid, targetId: target, amount: amt })
    }).then(res => res.json()).then(res => {
        if(res.error) alert(res.error);
        else { alert("Funds transferred."); syncAppDataCycle(); }
    });
}

function openAdminGate() {
    document.getElementById('modal-admin-gate').style.display = 'flex';
    document.getElementById('admin-lock-screen').style.display = 'flex';
    document.getElementById('admin-dashboard-panel').style.display = 'none';
}

/* HIGH-SECURITY NATIVE HARDWARE GATEWAY INTERFACE ENGINE (WEBAUTHN API) */
async function triggerNativeBiometricAuth() {
    if (!window.PublicKeyCredential) {
        alert("ബയോമെട്രിക് ഹാർഡ്‌വെയർ ലഭ്യമല്ല, മാനുവൽ എൻട്രി നൽകുന്നു.");
        authorizeDashboardAccess();
        return;
    }
    try {
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);
        const options = {
            challenge,
            rp: { name: "Extra Earn Engine" },
            user: { id: new Uint8Array([9,9,9,9]), name: "admin", displayName: "Root Master" },
            pubKeyCredParams: [{ type: "public-key", alg: -7 }],
            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
            timeout: 60000
        };
        const credential = await navigator.credentials.create({ publicKey: options });
        if (credential) {
            document.querySelector('.fp-icon').style.color = 'var(--success-green)';
            setTimeout(authorizeDashboardAccess, 500);
        }
    } catch (e) {
        alert("അധികാരപ്പെടുത്തൽ നിരസിച്ചു!");
    }
}

function authorizeDashboardAccess() {
    document.getElementById('admin-lock-screen').style.display = 'none';
    document.getElementById('admin-dashboard-panel').style.display = 'block';
}

function switchAdminPanelSection(tab, btn) {
    document.querySelectorAll('.admin-panel-section').forEach(s => s.classList.remove('active'));
    document.getElementById(`ad-sec-${tab}`).classList.add('active');
}

function saveAdminBanner() {
    const file = document.getElementById('ad-banner-file').files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        fetch(`${BACKEND_API}/api/settings/update`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ banners: [e.target.result] })
        }).then(() => { alert("Banner modified."); syncAppDataCycle(); });
    };
    reader.readAsDataURL(file);
}

function publishAdminTask() {
    const title = document.getElementById('ad-task-title').value;
    const amount = document.getElementById('ad-task-amt').value;
    const url = document.getElementById('ad-task-url').value;
    const desc = document.getElementById('ad-task-desc').value;
    let list = currentSystemState.tasks || [];
    list.push({ id: Date.now().toString(), title, amount, url, desc });
    fetch(`${BACKEND_API}/api/settings/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tasks: list })
    }).then(() => { alert("Task configured."); syncAppDataCycle(); });
}

function createSystemGiftCode() {
    const codeString = document.getElementById('ad-code-string').value.trim();
    const awardValue = document.getElementById('ad-code-value').value;
    fetch(`${BACKEND_API}/api/admin/create-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ codeString, awardValue })
    }).then(() => { alert("Giftcode system armed."); syncAppDataCycle(); });
}

function renderAdminViewLogs(settings) {
    const container = document.getElementById('ad-proofs-container');
    container.innerHTML = '';
    const proofs = settings.pendingProofs || {};
    Object.keys(proofs).forEach(k => {
        const p = proofs[k];
        container.innerHTML += `
            <div style="background:rgba(255,255,255,0.02); border:1px solid var(--panel-border); padding:10px; border-radius:8px;">
                <p style="font-size:12px;">User: ${p.userId} | Task: ${p.taskId}</p>
                <img src="${p.proofImg}" style="width:100%; max-height:120px; object-fit:contain; margin:8px 0;">
                <div style="display:flex; gap:10px;">
                    <button class="upi-btn" style="margin:0; background:var(--success-green); padding:5px;" onclick="judgeVerificationBox('${k}', true)">Approve</button>
                    <button class="upi-btn" style="margin:0; background:var(--danger-red); padding:5px;" onclick="judgeVerificationBox('${k}', false)">Reject</button>
                </div>
            </div>
        `;
    });
}

function judgeVerificationBox(key, status) {
    fetch(`${BACKEND_API}/api/admin/judge-proof`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ proofKey: key, approve: status })
    }).then(() => syncAppDataCycle());
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
