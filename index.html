<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EXTRA EARN - Premium Pro Suite</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
    --bg-gradient: linear-gradient(145deg, #07090e 0%, #020305 100%);
    --surface: #0b0e17;
    --surface-card: rgba(18, 22, 35, 0.7);
    --panel-border: rgba(255, 255, 255, 0.08);
    --accent-red: #ff333f;
    --accent-blue: #3b82f6;
    --accent-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    --text-white: #ffffff;
    --text-muted: #9ca3af;
    --success-green: #10b981;
    --nav-bg: rgba(11, 14, 23, 0.4); 
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body { background: var(--bg-gradient); color: var(--text-white); min-height: 100vh; overflow: hidden; display: flex; justify-content: center; }

.app-container { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; position: relative; background: transparent; }
.main-content { flex: 1; overflow-y: auto; padding: 22px; padding-bottom: 100px; scrollbar-width: none; }
.main-content::-webkit-scrollbar { display: none; }

.view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
.view-section.active { display: block; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* New Premium Header */
.dashboard-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.user-profile-meta { display: flex; align-items: center; gap: 14px; }
.avatar-frame { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--accent-blue); padding: 2px; background: rgba(59, 130, 246, 0.1); overflow: hidden; }
.avatar-frame img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.identity-lbl { font-size: 17px; font-weight: 700; color: var(--text-white); letter-spacing: -0.3px; }
.status-badge { font-size: 11px; color: var(--success-green); background: rgba(16, 185, 129, 0.08); padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.15); font-weight: 600; display: inline-block; margin-top: 2px; }

/* Elegant Glassmorphic Banner */
.promo-banner-matrix { width: 100%; background: linear-gradient(135deg, rgba(23, 28, 45, 0.8) 0%, rgba(14, 17, 27, 0.8) 100%); border: 1px solid var(--panel-border); border-radius: 20px; padding: 20px; margin-bottom: 24px; position: relative; overflow: hidden; backdrop-filter: blur(10px); }
.promo-banner-matrix::before { content: ''; position: absolute; top: -30%; left: -30%; width: 160%; height: 160%; background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 60%); pointer-events: none; }
.banner-headline { font-size: 20px; font-weight: 800; color: var(--text-white); margin-bottom: 6px; letter-spacing: -0.4px; }
.banner-subline { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
.banner-action-btn { background: var(--accent-gradient); color: var(--text-white); font-weight: 600; font-size: 13px; padding: 10px 20px; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); transition: all 0.2s; }
.banner-action-btn:active { transform: scale(0.97); opacity: 0.9; }

/* Metrics Cards Dynamic Style */
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
.metric-card { background: var(--surface-card); border: 1px solid var(--panel-border); border-radius: 18px; padding: 16px; backdrop-filter: blur(5px); }
.metric-lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.8px; }
.metric-val { font-size: 24px; font-weight: 800; color: var(--text-white); letter-spacing: -0.5px; }
.metric-val.currency::before { content: '₹'; margin-right: 3px; font-weight: 500; color: var(--text-muted); }

/* Task Section Styling */
.section-title { font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
.task-scroll-area { display: flex; flex-direction: column; gap: 12px; }
.task-item-card { background: var(--surface-card); border: 1px solid var(--panel-border); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s; }
.task-item-card:active { border-color: rgba(59, 130, 246, 0.4); background: rgba(23, 28, 45, 0.9); }
.task-info-block { display: flex; flex-direction: column; gap: 4px; }
.task-title-text { font-size: 15px; font-weight: 600; color: var(--text-white); }
.task-payout-amt { font-size: 13px; font-weight: 700; color: var(--success-green); }
.task-action-trigger { background: rgba(255,255,255,0.06); border: 1px solid var(--panel-border); color: var(--text-white); font-size: 12px; font-weight: 600; padding: 9px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
.task-action-trigger:active { background: rgba(255,255,255,0.1); }
.task-action-trigger.claimed { color: var(--text-muted); background: transparent; border-color: transparent; cursor: default; font-weight: 500; }

/* Premium Navigation System */
.bottom-nav-bar { width: 100%; max-width: 480px; height: 76px; background: var(--nav-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top: 1px solid var(--panel-border); position: fixed; bottom: 0; display: grid; grid-template-columns: repeat(4, 1fr); align-items: center; justify-items: center; z-index: 100; box-shadow: 0 -8px 24px rgba(0,0,0,0.3); }
.nav-tab-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-muted); text-decoration: none; font-size: 11px; font-weight: 600; cursor: pointer; width: 100%; height: 100%; justify-content: center; transition: color 0.2s; }
.nav-tab-item.active { color: var(--accent-blue); }
.nav-icon { width: 22px; height: 22px; fill: currentColor; transition: transform 0.2s; }
.nav-tab-item.active .nav-icon { transform: translateY(-2px); }

/* Sheets and Popups (Glassmorphism Modal) */
.modal-view-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 4, 7, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1000; justify-content: center; align-items: flex-end; }
.modal-view-overlay.active { display: flex; }
.popup-sheet-plate { width: 100%; max-width: 480px; background: #0c0f1a; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 28px 28px 0 0; padding: 26px; max-height: 88vh; overflow-y: auto; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}

.popup-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.popup-title-text { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
.close-popup-icon { width: 24px; height: 24px; fill: var(--text-muted); cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
.close-popup-icon:hover { opacity: 1; }

/* Input Elements */
.input-group-block { margin-bottom: 18px; display: flex; flex-direction: column; gap: 7px; }
.input-label-text { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
.form-input-field { background: rgba(255,255,255,0.04); border: 1px solid var(--panel-border); height: 50px; border-radius: 12px; padding: 0 16px; color: var(--text-white); font-size: 14px; width: 100%; transition: border-color 0.2s; }
.form-input-field:focus { outline: none; border-color: var(--accent-blue); background: rgba(255,255,255,0.06); }
.form-select-field { background: #111524; border: 1px solid var(--panel-border); height: 50px; border-radius: 12px; padding: 0 16px; color: var(--text-white); font-size: 14px; width: 100%; outline: none; }
.submit-action-btn { width: 100%; height: 50px; background: var(--accent-gradient); color: var(--text-white); font-weight: 600; border: none; border-radius: 12px; margin-top: 12px; cursor: pointer; font-size: 14px; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25); transition: all 0.2s; }
.submit-action-btn:active { transform: scale(0.98); }
.submit-action-btn.danger { background: linear-gradient(135deg, #ff2a33 0%, #cc141b 100%); box-shadow: 0 4px 14px rgba(255, 42, 51, 0.25); }

/* Fixed Ledger Cards */
.ledger-item-card { background: rgba(255,255,255,0.03); border: 1px solid var(--panel-border); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.ledger-meta-info { display: flex; flex-direction: column; gap: 5px; }
.ledger-title-lbl { font-size: 14px; font-weight: 600; color: var(--text-white); }
.ledger-date-stamp { font-size: 11px; color: var(--text-muted); }
.ledger-status-pill { font-size: 11px; padding: 4px 10px; border-radius: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.ledger-status-pill.approved { background: rgba(16,185,129,0.12); color: var(--success-green); }
.ledger-status-pill.pending { background: rgba(245,158,11,0.12); color: #f59e0b; }
.ledger-status-pill.rejected { background: rgba(255,42,51,0.12); color: var(--accent-red); }

/* Message Templates Manager */
.msg-template-box { background: rgba(255,255,255,0.02); border: 1px solid var(--panel-border); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
.msg-template-box textarea { width: 100%; background: rgba(0,0,0,0.25); border: 1px solid var(--panel-border); border-radius: 8px; padding: 10px; color: #fff; font-size: 13px; line-height: 1.4; resize: vertical; margin-top: 8px; min-height: 70px; outline: none; }
.msg-template-box textarea:focus { border-color: var(--accent-blue); }
</style>
</head>
<body>

<div class="app-container">
    <div class="main-content">
        
        <div id="view_dashboard" class="view-section active">
            <div class="dashboard-header">
                <div class="user-profile-meta">
                    <div class="avatar-frame"><img id="user_avatar_img" src="" alt=""></div>
                    <div>
                        <div id="user_display_name" class="identity-lbl">...</div>
                        <span class="status-badge">Premium Pool User</span>
                    </div>
                </div>
                <button id="master_adm_btn" class="banner-action-btn" style="background:#1e293b; display:none;" onclick="openAdminDashboardView()">Console</button>
            </div>

            <div class="promo-banner-matrix">
                <div id="banner_headline_txt" class="banner-headline">...</div>
                <div id="banner_subline_txt" class="banner-subline">...</div>
                <button class="banner-action-btn" onclick="openGiftCodeRedeemPopup()">Claim Voucher</button>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-lbl">Available Assets</div>
                    <div id="user_balance_lbl" class="metric-val currency">0.00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-lbl">Current Debt</div>
                    <div id="user_debt_lbl" class="metric-val currency" style="color:var(--accent-red)">0.00</div>
                </div>
            </div>

            <div class="section-title">Micro Tasks Portal</div>
            <div id="tasks_wrapper_panel" class="task-scroll-area"></div>
        </div>

        <div id="view_wallet" class="view-section">
            <div class="section-title">P2P Asset Transfer</div>
            <div class="metric-card" style="margin-bottom:24px;">
                <div class="input-group-block">
                    <label class="input-label-text">Recipient User ID (UID)</label>
                    <input type="number" id="p2p_recipient_uid" class="form-input-field" placeholder="Enter Telegram UID">
                </div>
                <div class="input-group-block">
                    <label class="input-label-text">Amount to Send (₹)</label>
                    <input type="number" id="p2p_transfer_amount" class="form-input-field" placeholder="0.00">
                </div>
                <button class="submit-action-btn" onclick="executePeerToPeerAssetTransfer()">Authorize Transfer</button>
            </div>

            <div class="section-title">Withdrawal Gateway</div>
            <div class="metric-card">
                <div class="input-group-block">
                    <label class="input-label-text">Linked UPI ID Address</label>
                    <input type="text" id="withdrawal_upi_address" class="form-input-field" placeholder="username@bank">
                </div>
                <div class="input-group-block">
                    <label class="input-label-text">Amount to Disburse</label>
                    <input type="number" id="withdrawal_payout_amount" class="form-input-field" placeholder="Min. ₹1.00">
                </div>
                <button class="submit-action-btn" style="background:linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 14px rgba(16, 185, 129, 0.25);" onclick="submitWithdrawalPayoutRequest()">Request Cashout</button>
            </div>
        </div>

        <div id="view_history" class="view-section">
            <div class="section-title">Transaction Ledger History</div>
            <div id="ledger_items_container"></div>
        </div>

        <div id="view_invites" class="view-section">
            <div class="section-title">Referral Matrix Network</div>
            <div class="metric-card" style="margin-bottom:24px; text-align:center;">
                <div class="metric-lbl">Your Invited Affiliates</div>
                <div id="total_invites_count" class="metric-val" style="font-size:36px; margin:12px 0; color: var(--accent-blue);">0</div>
                <div class="input-group-block">
                    <input type="text" id="txtBotReferLink" class="form-input-field" readonly style="text-align:center; background:rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.04);">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;">
                    <button class="submit-action-btn" style="margin:0; background:#1e293b; box-shadow:none;" onclick="copyPartnerBotLink()">Copy Link</button>
                    <button class="submit-action-btn" style="margin:0;" onclick="sharePartnerBotLink()">Share Link</button>
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav-bar">
        <div class="nav-tab-item active" onclick="switchApplicationView('dashboard', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Tasks</span>
        </div>
        <div class="nav-tab-item" onclick="switchApplicationView('wallet', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2-.9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5 0.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <span>Wallet</span>
        </div>
        <div class="nav-tab-item" onclick="switchApplicationView('history', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
            <span>Ledger</span>
        </div>
        <div class="nav-tab-item" onclick="switchApplicationView('invites', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span>Affiliates</span>
        </div>
    </div>
</div>

<div id="global_modal_overlay" class="modal-view-overlay" onclick="closeActiveModalWindow(event)">
    
    <div id="sheet_gift_code" class="popup-sheet-plate" style="display:none;">
        <div class="popup-header-row">
            <div class="popup-title-text">Redeem Token Voucher</div>
            <svg class="close-popup-icon" onclick="dismissModalOverlayLayer()" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </div>
        <div class="input-group-block">
            <label class="input-label-text">Voucher String Code</label>
            <input type="text" id="walletGiftCodeInput" class="form-input-field" placeholder="EXTRA-XXXX" style="text-transform:uppercase;">
        </div>
        <button class="submit-action-btn" onclick="claimPlatformGiftCode()">Redeem Voucher Asset</button>
    </div>

    <div id="sheet_admin_dashboard" class="popup-sheet-plate" style="display:none; max-height:92vh;">
        <div class="popup-header-row">
            <div class="popup-title-text">Ultra Suite Control Console</div>
            <svg class="close-popup-icon" onclick="dismissModalOverlayLayer()" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </div>

        <div style="display:flex; gap:8px; margin-bottom:18px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none;">
            <button class="banner-action-btn" style="background:var(--accent-blue); padding: 8px 16px;" id="tab_btn_balance" onclick="switchAdminSubTab('balance')">Balance</button>
            <button class="banner-action-btn" style="background:#1e293b; padding: 8px 16px;" id="tab_btn_tasks" onclick="switchAdminSubTab('tasks')">Task Mgr</button>
            <button class="banner-action-btn" style="background:#1e293b; padding: 8px 16px;" id="tab_btn_banners" onclick="switchAdminSubTab('banners')">Banners</button>
            <button class="banner-action-btn" style="background:#1e293b; padding: 8px 16px;" id="tab_btn_promo" onclick="switchAdminSubTab('promo')">Promo Codes</button>
            <button class="banner-action-btn" style="background:#1e293b; padding: 8px 16px;" id="tab_btn_msg" onclick="switchAdminSubTab('msg')">Templates</button>
        </div>

        <div id="adm_subtab_balance" class="adm-subtab-section">
            <div class="input-group-block">
                <label class="input-label-text">Target User Telegram UID</label>
                <input type="number" id="admBalanceTargetUid" class="form-input-field" placeholder="User ID">
            </div>
            <div class="input-group-block">
                <label class="input-label-text">Financial Operation Vector</label>
                <select id="admBalanceAction" class="form-select-field">
                    <option value="add_fund">Add Funds (Wallet Balance)</option>
                    <option value="remove">Debit Assets (Remove Balance)</option>
                    <option value="add_debt">Assign New Debt (Outstanding)</option>

        </div>

        <div id="adm_subtab_tasks" class="adm-subtab-section" style="display:none;">
            <div class="input-group-block">
                <label class="input-label-text">Task Campaign Title</label>
                <input type="text" id="adm_task_title" class="form-input-field" placeholder="Join Official Channel">

            <div class="input-group-block">

            </div>
            <div class="input-group-block">
                <label class="input-label-text">Voucher Liquidity Amount (₹)</label>
                <input type="number" id="adm_promo_amount" class="form-input-field" placeholder="10.00">
            </div>
            <button class="submit-action-btn" onclick="executeAdminPromoCodeGeneration()">Mint Voucher Code</button>

            <div class="input-group-block">
                <label class="input-label-text">Banner Headline Title</label>
                <input type="text" id="adm_banner_head" class="form-input-field" placeholder="Premium Dashboard Active">
            </div>
            <div class="input-group-block">
                <label class="input-label-text">Sub-Headline Text Caption</label>
                <input type="text" id="adm_banner_sub" class="form-input-field" placeholder="Complete jobs now to earn.">
            </div>

            <button class="submit-action-btn danger" onclick="removeActiveAdminBanner()">Uninstall Banner Matrix</button>
        </div>

        <div id="adm_subtab_msg" class="adm-subtab-section" style="display:none;">
            <div style="max-height: 42vh; overflow-y: auto; padding-right: 4px; scrollbar-width: thin;">
                <div class="msg-template-box">
                    <label class="input-label-text">Wallet Credited Alert Message</label>
                    <textarea id="tpl_msg_credit" placeholder="Example: ₹{amount} added to your account."></textarea>
                </div>
                <div class="msg-template-box">
                    <label class="input-label-text">Wallet Debited Alert Message</label>
                    <textarea id="tpl_msg_debit" placeholder="Example: ₹{amount} deducted from your account."></textarea>
                </div>
                <div class="msg-template-box">
                    <label class="input-label-text">Withdrawal Processing Template</label>
                    <textarea id="tpl_msg_wd_pending" placeholder="Your payout request of ₹{amount} is pending."></textarea>
                </div>
                <div class="msg-template-box">
                    <label class="input-label-text">Withdrawal Approved Template</label>
                    <textarea id="tpl_msg_wd_success" placeholder="Payout of ₹{amount} approved successfully!"></textarea>
                </div>
                <div class="msg-template-box">
                    <label class="input-label-text">Withdrawal Rejected Template</label>
                    <textarea id="tpl_msg_wd_reject" placeholder="Your payout request of ₹{amount} was rejected."></textarea>
                </div>
            </div>
            <button class="submit-action-btn" style="background:linear-gradient(135deg, #10b981 0%, #059669 100%);" onclick="saveGlobalMessageTemplates()">Save Message Configurations</button>
        </div>

    </div>
</div>

<script>
const tgInstanceObj = window.Telegram.WebApp;
tgInstanceObj.ready();
tgInstanceObj.expand();

const activeGlobalUserId = tgInstanceObj.initDataUnsafe?.user?.id || 501889840;
const activeGlobalUsername = tgInstanceObj.initDataUnsafe?.user?.first_name || "Suite Alpha Developer";

const CORE_BACKEND_API_URL = window.location.origin;

let clientSideCachedState = null;

function syncPlatformData() {
    fetch(`${CORE_BACKEND_API_URL}/api/mini-app/sync`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeGlobalUserId, username: activeGlobalUsername })
    })
    .then(res => res.json())
    .then(data => {
        clientSideCachedState = data;
        renderUserDashboardInterface();
    })
    .catch(err => console.error("Matrix synchronization exception:", err));
}

function renderUserDashboardInterface() {
    if (!clientSideCachedState) return;
    
    const user = clientSideCachedState.user;
    const settings = clientSideCachedState.botSettings;

    // Profile Meta
    document.getElementById('user_display_name').innerText = user.name;
    document.getElementById('user_balance_lbl').innerText = parseFloat(user.balance).toFixed(2);
    document.getElementById('user_debt_lbl').innerText = parseFloat(user.debt || 0).toFixed(2);
    document.getElementById('total_invites_count').innerText = user.invites?.length || 0;
    document.getElementById('txtBotReferLink').value = `https://t.me/${settings.botUsername || 'bot'}?start=${user.id}`;
    
    if (clientSideCachedState.profilePic) {
        document.getElementById('user_avatar_img').src = clientSideCachedState.profilePic;
    }

    // Dynamic Admin Button Visibility
    if (parseInt(activeGlobalUserId) === parseInt(settings.masterAdminId || 501889840)) {
        document.getElementById('master_adm_btn').style.display = 'block';
    }

    // Dynamic Customized Banner Displays
    if (settings.customBanner) {
        document.getElementById('banner_headline_txt').innerText = settings.customBanner.headline || "Premium Hub";
        document.getElementById('banner_subline_txt').innerText = settings.customBanner.subline || "Tasks waiting.";
    }

    // Initialize Message Template inputs inside Admin View
    if (settings.messages) {
        document.getElementById('tpl_msg_credit').value = settings.messages.adminCredit || "";
        document.getElementById('tpl_msg_debit').value = settings.messages.adminDebit || "";
        document.getElementById('tpl_msg_wd_pending').value = settings.messages.withdrawPending || "";
        document.getElementById('tpl_msg_wd_success').value = settings.messages.withdrawSuccess || "";
        document.getElementById('tpl_msg_wd_reject').value = settings.messages.withdrawReject || "";
    }

    // Map Micro Tasks Matrix
    const taskPanel = document.getElementById('tasks_wrapper_panel');
    taskPanel.innerHTML = "";
    
    if (settings.tasks && settings.tasks.length > 0) {
        settings.tasks.forEach(task => {
            const isCompleted = user.completedTasks?.includes(task.id);
            const card = document.createElement('div');
            card.className = "task-item-card";
            card.innerHTML = `
                <div class="task-info-block">
                    <div class="task-title-text">${task.title}</div>
                    <div class="task-payout-amt">₹${parseFloat(task.amount).toFixed(2)}</div>
                </div>
                ${isCompleted ? 
                    `<button class="task-action-trigger claimed" disabled>Claimed ✅</button>` : 
                    `<button class="task-action-trigger" onclick="claimMicroTaskPayout('${task.id}', '${task.link}')">Start Task</button>`
                }
            `;
            taskPanel.appendChild(card);
        });
    } else {
        taskPanel.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:20px;">No micro tasks assigned today.</div>`;
    }

    // Map Transaction Ledgers (FIXED [object Object] DISPLAY ISSUE HERE)
    const ledgerPanel = document.getElementById('ledger_items_container');
    ledgerPanel.innerHTML = "";
    if (user.history && user.history.length > 0) {
        user.history.forEach(item => {
            const row = document.createElement('div');
            row.className = "ledger-item-card";
            
            if (typeof item === 'string') {
                row.innerHTML = `
                    <div class="ledger-meta-info">
                        <div class="ledger-title-lbl">${item}</div>
                        <div class="ledger-date-stamp">System Ledger Log</div>
                    </div>
                    <span class="ledger-status-pill approved">System</span>
                `;
            } else {
                // Formatting Object Data beautifully safely
                const statusClass = (item.status || "approved").toLowerCase();
                const methodText = item.method || "Asset Log";
                const amountText = item.amount ? `₹${parseFloat(item.amount).toFixed(2)}` : "0.00";
                const titleText = item.taskTitle || item.description || "System Operation Sync";
                const dateText = item.date || "Live Date";

                row.innerHTML = `
                    <div class="ledger-meta-info">
                        <div class="ledger-title-lbl">${methodText} - ${titleText}</div>
                        <div class="ledger-date-stamp">${dateText}</div>
                    </div>
                    <span class="ledger-status-pill ${statusClass}">${item.status || 'Approved'} (${amountText})</span>
                `;
            }
            ledgerPanel.appendChild(row);
        });
    } else {
        ledgerPanel.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:20px;">No ledger transactions logged yet.</div>`;
    }
}

function switchApplicationView(viewTarget, element) {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab-item').forEach(t => t.classList.remove('active'));
    
    document.getElementById(`view_${viewTarget}`).classList.add('active');
    element.classList.add('active');
}

function openGiftCodeRedeemPopup() {
    document.getElementById('global_modal_overlay').classList.add('active');
    document.getElementById('sheet_gift_code').style.display = 'block';
    document.getElementById('sheet_admin_dashboard').style.display = 'none';
}

function openAdminDashboardView() {
    document.getElementById('global_modal_overlay').classList.add('active');
    document.getElementById('sheet_admin_dashboard').style.display = 'block';
    document.getElementById('sheet_gift_code').style.display = 'none';
}

function dismissModalOverlayLayer() {
    document.getElementById('global_modal_overlay').classList.remove('active');
}

function closeActiveModalWindow(event) {
    if (event.target.id === "global_modal_overlay") dismissModalOverlayLayer();
}

function switchAdminSubTab(subTabId) {
    document.querySelectorAll('.adm-subtab-section').forEach(s => s.style.display = 'none');
    document.getElementById(`adm_subtab_${subTabId}`).style.display = 'block';
    
    document.querySelectorAll('#sheet_admin_dashboard .banner-action-btn').forEach(b => {
        if(b.id.startsWith('tab_btn_')) b.style.background = '#1e293b';
    });
    document.getElementById(`tab_btn_${subTabId}`).style.background = 'var(--accent-blue)';
}

/* ================= WEB APP CORE API ACTIONS ================= */

function claimMicroTaskPayout(taskId, link) {
    if(link && link !== '#') window.open(link, '_blank');
    
    fetch(`${CORE_BACKEND_API_URL}/api/mini-app/claim-task`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeGlobalUserId, taskId: taskId })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success) alert("Task verified and reward credited!");
        syncPlatformData();
    });
}

function executePeerToPeerAssetTransfer() {
    const targetUid = parseInt(document.getElementById('p2p_recipient_uid').value);
    const amount = parseFloat(document.getElementById('p2p_transfer_amount').value);
    
    if(!targetUid || isNaN(amount) || amount <= 0) return alert("Please specify valid values.");
    
    fetch(`${CORE_BACKEND_API_URL}/api/mini-app/peer-transfer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeGlobalUserId, targetUid: targetUid, amount: amount })
    })
    .then(res => {
        if(!res.ok) return res.json().then(e => { throw new Error(e.error); });
        return res.json();
    })
    .then(() => {
        alert("P2P Asset Transfer Completed!");
        document.getElementById('p2p_recipient_uid').value = "";
        document.getElementById('p2p_transfer_amount').value = "";
        syncPlatformData();
    })
    .catch(err => alert("Transfer Error: " + err.message));
}

function submitWithdrawalPayoutRequest() {
    const address = document.getElementById('withdrawal_upi_address').value.trim();
    const amount = parseFloat(document.getElementById('withdrawal_payout_amount').value);
    
    if(!address || isNaN(amount) || amount <= 0) return alert("Verify gateway values.");
    
    fetch(`${CORE_BACKEND_API_URL}/api/mini-app/withdraw`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeGlobalUserId, address: address, amount: amount, method: "UPI" })
    })
    .then(res => {
        if(!res.ok) return res.json().then(e => { throw new Error(e.error); });
        return res.json();
    })
    .then(() => {
        alert("Cashout Request Transmitted!");
        document.getElementById('withdrawal_payout_amount').value = "";
        syncPlatformData();
    })
    .catch(err => alert("Gateway Error: " + err.message));
}

function claimPlatformGiftCode() {
    const code = document.getElementById('walletGiftCodeInput').value.trim().toUpperCase();
    if(!code) return alert("Voucher string missing.");

    fetch(`${CORE_BACKEND_API_URL}/api/mini-app/redeem-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: activeGlobalUserId, code: code })
    })
    .then(res => {
        if(!res.ok) return res.json().then(e => { throw new Error(e.error); });
        return res.json();
    })
    .then(() => {
        alert("Voucher Asset Credited!");
        document.getElementById('walletGiftCodeInput').value = "";
        dismissModalOverlayLayer();
        syncPlatformData();
    })
    .catch(err => alert("Voucher Exception: " + err.message));
}

/* ================= ADMIN MANAGEMENT INTERFACE CORE ACTIONS ================= */

function executeAdminBalanceOverride() {
    const targetUid = document.getElementById('admBalanceTargetUid').value.trim();
    const action = document.getElementById('admBalanceAction').value;
    const amount = parseFloat(document.getElementById('admBalanceAmount').value);
    
    if (!targetUid || isNaN(amount) || amount <= 0) return alert("Enter accurate metrics properties.");

    let operationAction = action;
    let targetIsDebt = false;

    if (action === "add_debt") {
        operationAction = "add";
        targetIsDebt = true;
    } else if (action === "remove_debt") {
        operationAction = "remove";
        targetIsDebt = true;
    }

    fetch(`${CORE_BACKEND_API_URL}/api/admin/modify-balance`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ targetUid: targetUid, action: operationAction, amount: amount, isDebt: targetIsDebt })
    })
    .then(res => {
        if(!res.ok) throw new Error("Synchronization failure.");
        return res.json();
    })
    .then(() => {
        alert("User Assets Balance Adjusted Successfully!");
        document.getElementById('admBalanceAmount').value = "";
        dismissModalOverlayLayer();
        syncPlatformData();
    })
    .catch(err => alert(err.message));
}

function executeAdminTaskDeployment() {
    const title = document.getElementById('adm_task_title').value.trim();
    const payout = document.getElementById('adm_task_payout').value;
    const link = document.getElementById('adm_task_url').value.trim();

    if(!title || !payout) return alert("Provide metadata specs.");

    const generatedTaskId = "tk_" + Date.now();
    const activeTasksList = [...(clientSideCachedState?.botSettings?.tasks || [])];
    activeTasksList.push({ id: generatedTaskId, title: title, amount: payout, link: link || "#" });

    fetch(`${CORE_BACKEND_API_URL}/api/settings/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tasks: activeTasksList })
    }).then(() => {
        alert("Micro Task Campaign Deployed!");
        document.getElementById('adm_task_title').value = "";
        document.getElementById('adm_task_payout').value = "";
        document.getElementById('adm_task_url').value = "";
        dismissModalOverlayLayer();
        syncPlatformData();
    });
}

function executeAdminPromoCodeGeneration() {
    const code = document.getElementById('adm_promo_string').value.trim().toUpperCase();
    const amount = document.getElementById('adm_promo_amount').value;

    if(!code || !amount) return alert("Missing Voucher details.");

    fetch(`${CORE_BACKEND_API_URL}/api/admin/create-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ codeString: code, awardValue: amount })
    }).then(() => {
        alert("Voucher Gift Token Minted!");
        document.getElementById('adm_promo_string').value = "";
        document.getElementById('adm_promo_amount').value = "";
        dismissModalOverlayLayer();
        syncPlatformData();
    });
}

function saveActiveAdminBannerSettings() {
    const head = document.getElementById('adm_banner_head').value.trim();
    const sub = document.getElementById('adm_banner_sub').value.trim();
    
    if(!head) return alert("Headline missing.");
    const customBannerObj = { headline: head, subline: sub };
    
    fetch(`${CORE_BACKEND_API_URL}/api/settings/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ customBanner: customBannerObj })
    }).then(() => {
        alert("Global Dashboard Banner Saved!");
        dismissModalOverlayLayer();
        syncPlatformData();
    });
}

function removeActiveAdminBanner() {
    const customBannerObj = { headline: "Premium Dashboard", subline: "Complete micro tasks to earn assets instantly." };
    fetch(`${CORE_BACKEND_API_URL}/api/settings/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ customBanner: customBannerObj })
    }).then(() => {
        alert("Active Banner successfully uninstalled.");
        dismissModalOverlayLayer();
        syncPlatformData();
    });
}

function saveGlobalMessageTemplates() {
    const activeMessagesObj = { ...(clientSideCachedState?.botSettings?.messages || {}) };
    
    activeMessagesObj.adminCredit = document.getElementById('tpl_msg_credit').value;
    activeMessagesObj.adminDebit = document.getElementById('tpl_msg_debit').value;
    activeMessagesObj.withdrawPending = document.getElementById('tpl_msg_wd_pending').value;
    activeMessagesObj.withdrawSuccess = document.getElementById('tpl_msg_wd_success').value;
    activeMessagesObj.withdrawReject = document.getElementById('tpl_msg_wd_reject').value;

    fetch(`${CORE_BACKEND_API_URL}/api/settings/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: activeMessagesObj })
    }).then(() => {
        alert("Message Templates Matrix Saved Successfully!");
        dismissModalOverlayLayer();
        syncPlatformData();
    });
}

function copyPartnerBotLink() {
    navigator.clipboard.writeText(document.getElementById('txtBotReferLink').value).then(() => alert("Saved to memory!"));
}
function sharePartnerBotLink() {
    window.open(`https://t.me/share/url?url=${encodeURIComponent(document.getElementById('txtBotReferLink').value)}`, '_blank');
}

// Initial Core Data Pull
syncPlatformData();
</script>
</body>
</html>
