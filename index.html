<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Extra Earn - Pure Glass Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-card: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --blue: #3498db;
            --green: #2ecc71;
            --danger: #e74c3c;
            --text-muted: #9ca3af;
        }

        * { 
            margin: 0; padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background: var(--bg); 
            color: white; 
            overflow-x: hidden; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            position: relative;
            padding-bottom: 110px;
            display: flex;
            flex-direction: column;
        }

        /* ✨ PREMIUM TOP HEADER (Pure Glass Style) */
        .header {
            height: 70px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-section h1 {
            font-size: 19px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-section h1 span {
            color: var(--blue);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-balance {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            object-fit: cover;
        }

        /* 🧭 NAVIGATION TABS SECTION */
        .view-section {
            flex: 1;
            padding: 20px;
            display: none;
        }
        .view-section.active {
            display: block;
        }

        /* 🖼️ GLASS SLIDER / BANNER */
        .banner-wrapper {
            width: 100%;
            height: 160px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: var(--glass-card);
            margin-bottom: 24px;
            display: none;
        }
        .banner-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 🎯 ULTRA GLASS LUXURY CARDS */
        .glass-card {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 💸 TASK TILES */
        .task-node {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .task-node:hover {
            background: var(--glass);
        }
        .task-info-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .task-node-title {
            font-size: 15px;
            font-weight: 600;
        }
        .task-node-payout {
            font-size: 16px;
            font-weight: 700;
            color: var(--green);
        }

        /* 🔘 PURE GLASS INTERACTIVE INPUTS & BUTTONS */
        .glass-input-group {
            margin-bottom: 16px;
        }
        .glass-input-group label {
            font-size: 13px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .glass-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .glass-input:focus {
            border-color: var(--blue);
        }

        .glass-btn {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 15px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }
        .glass-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }
        .glass-btn.primary {
            background: var(--blue);
            border: none;
        }
        .glass-btn.success {
            background: rgba(46, 204, 113, 0.15);
            border-color: rgba(46, 204, 113, 0.4);
            color: var(--green);
        }

        /* 🧭 ORIGINAL GLASS NAVIGATION FOOTER */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 440px;
            height: 66px;
            background: rgba(10, 10, 10, 0.3);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            gap: 4px;
            transition: color 0.3s;
            cursor: pointer;
        }

        .nav-link i {
            font-size: 20px;
        }

        .nav-link.active {
            color: var(--blue);
        }

        /* 🚨 OVERLAY DOCK POPUPS (Glassmorphism Modal) */
        .glass-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-body {
            background: rgba(15, 15, 15, 0.7);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 24px;
            position: relative;
        }
        .close-trigger {
            position: absolute;
            top: 18px; right: 18px;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
        }

        /* 🔐 HARDWARE BIOMETRIC ZONE */
        .hardware-auth-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            gap: 24px;
        }
        .biometric-glyph {
            font-size: 70px;
            color: var(--blue);
            animation: auraPulse 2.5s infinite;
            cursor: pointer;
        }
        @keyframes auraPulse {
            0% { transform: scale(1); opacity: 0.6; text-shadow: 0 0 0px rgba(52,152,219,0); }
            50% { transform: scale(1.08); opacity: 1; text-shadow: 0 0 20px rgba(52,152,219,0.5); }
            100% { transform: scale(1); opacity: 0.6; text-shadow: 0 0 0px rgba(52,152,219,0); }
        }

        /* 🛡️ ADMIN MANAGEMENT SWITCHES */
        .admin-tab-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .admin-strip-btn {
            padding: 8px 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .admin-strip-btn.active {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }
        .panel-sub-view { display: none; }
        .panel-sub-view.active { display: block; }
    </style>
</head>
<body>

<div class="app-container">

    <header class="header">
        <div class="logo-section">
            <h1>Extra<span>Earn</span></h1>
        </div>
        <div class="header-right">
            <div class="header-balance">
                <i class="fa-solid fa-wallet"></i> ₹<span id="lbl-top-bal">0.00</span>
            </div>
            <img id="img-top-avatar" class="user-avatar" src="https://img.icons8.com/colors/344/test-account.png">
        </div>
    </header>

    <div id="section-home" class="view-section active">
        <div id="wrapper-banner" class="banner-wrapper"></div>
        <div class="section-title"><i class="fa-solid fa-bolt"></i> Available Campaigns</div>
        <div id="list-tasks-dock"></div>
    </div>

    <div id="section-wallet" class="view-section">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); font-size: 13px; font-weight: 600; margin-bottom: 6px;">
                <span>Available Capital</span>
                <span id="indicator-debt" style="color: var(--danger); font-weight: 700; display: none;"><i class="fa-solid fa-hand-holding-dollar"></i> Debt: ₹<span id="lbl-debt-val">0</span></span>
            </div>
            <div style="font-size: 36px; font-weight: 800; letter-spacing: -1px;">₹<span id="lbl-main-bal">0.00</span></div>
        </div>

        <button class="glass-btn primary" onclick="revealModal('popup-payout')">
            <i class="fa-solid fa-money-bill-transfer"></i> Withdraw Payout
        </button>

        <div class="glass-card" style="margin-top: 24px;">
            <div class="section-title"><i class="fa-solid fa-gift"></i> Voucher Codes</div>
            <div class="glass-input-group">
                <input type="text" id="input-voucher-code" class="glass-input" placeholder="Enter Gift Code Payload...">
            </div>
            <button class="glass-btn success" onclick="triggerRedeemAction()">
                <i class="fa-solid fa-ticket"></i> Redeem Voucher Link
            </button>
        </div>
    </div>

    <div id="section-pay" class="view-section">
        <div class="glass-card">
            <div class="section-title"><i class="fa-solid fa-paper-plane"></i> P2P Funds Distribution</div>
            <div class="glass-input-group">
                <label>Target Identity Account UID</label>
                <input type="number" id="pay-target-id" class="glass-input" placeholder="Recipient Telegram ID">
            </div>
            <div class="glass-input-group">
                <label>Transfer Amount (₹)</label>
                <input type="number" id="pay-target-amount" class="glass-input" placeholder="0.00">
            </div>
            <button class="glass-btn primary" onclick="executeP2PTransfer()">
                <i class="fa-solid fa-circle-check"></i> Disburse Assets
            </button>
        </div>
    </div>

    <div id="section-profile" class="view-section">
        <div class="glass-card" style="text-align: center;">
            <img id="img-large-avatar" src="" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--blue); margin-bottom: 12px; object-fit: cover;">
            <h3 id="lbl-profile-name" style="font-size: 18px; font-weight: 700;">Account Master</h3>
            <p style="color: var(--text-muted); font-size: 13px; margin-top: 4px;">UID Node: <span id="lbl-profile-uid">-</span></p>
        </div>

        <div id="admin-gate-access" style="display: none; margin-top: 20px;">
            <button class="glass-btn" style="background: rgba(255,255,255,0.05);" onclick="openSecureAdminGate()">
                <i class="fa-solid fa-user-shield" style="color: var(--blue);"></i> System Control Terminal
            </button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link active" onclick="navigateTab('home', this)"><i class="fa-solid fa-grip"></i>Tasks</div>
        <div class="nav-link" onclick="navigateTab('wallet', this)"><i class="fa-solid fa-wallet"></i>Wallet</div>
        <div class="nav-link" onclick="navigateTab('pay', this)"><i class="fa-solid fa-paper-plane"></i>Pay</div>
        <div class="nav-link" onclick="navigateTab('profile', this)"><i class="fa-solid fa-user"></i>Profile</div>
    </nav>

</div>

<div id="popup-task-hub" class="glass-modal">
    <div class="modal-body">
        <i class="fa-solid fa-xmark close-trigger" onclick="dismissModal('popup-task-hub')"></i>
        <h3 id="lbl-modal-task-title" style="font-size: 18px; font-weight: 700; margin-bottom: 6px;">-</h3>
        <div id="lbl-modal-task-bounty" style="color: var(--green); font-weight: 800; font-size: 18px; margin-bottom: 14px;">₹0.00</div>
        <div id="lbl-modal-task-desc" style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5;">-</div>
        
        <button class="glass-btn primary" id="btn-task-redirect" style="margin-bottom: 20px;">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> Open Mission Target
        </button>

        <div id="zone-proof-submission">
            <div class="glass-input-group">
                <label><i class="fa-solid fa-image"></i> Upload Screenshot Verification Proof</label>
                <input type="file" id="file-proof-payload" class="glass-input" accept="image/*">
            </div>
            <button class="glass-btn success" onclick="uploadVerificationImage()"><i class="fa-solid fa-cloud-arrow-up"></i> Submit Audit Log</button>
        </div>
        <div id="zone-proof-lockout" style="display: none; text-align: center; color: var(--green); font-weight: 600; font-size: 14px; padding: 10px;">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Audit Record Registered & Locked.
        </div>
    </div>
</div>

<div id="popup-payout" class="glass-modal">
    <div class="modal-body">
        <i class="fa-solid fa-xmark close-trigger" onclick="dismissModal('popup-payout')"></i>
        <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 16px;"><i class="fa-solid fa-money-bill-transfer"></i> Automated UPI Payout</h3>
        <div class="glass-input-group">
            <label>UPI Virtual Payment Address</label>
            <input type="text" id="txt-payout-upi" class="glass-input" placeholder="username@upi">
        </div>
        <div class="glass-input-group">
            <label>Requested Payout Quantum (₹)</label>
            <input type="number" id="txt-payout-sum" class="glass-input" placeholder="0.00">
        </div>
        <button class="glass-btn primary" onclick="submitWithdrawalRequest()"><i class="fa-solid fa-paper-plane"></i> Deploy Withdrawal</button>
    </div>
</div>

<div id="popup-admin-terminal" class="glass-modal">
    <div class="modal-body" style="max-width: 440px; max-height: 85vh; overflow-y: auto;">
        <i class="fa-solid fa-xmark close-trigger" onclick="dismissModal('popup-admin-terminal')"></i>
        
        <div id="layer-hardware-lock" class="hardware-auth-center">
            <i class="fa-solid fa-fingerprint biometric-glyph" onclick="authenticateHardwareSensor()"></i>
            <p style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Scan Device Biometric Node</p>
        </div>

        <div id="layer-admin-dashboard" style="display: none;">
            <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 16px;"><i class="fa-solid fa-user-shield"></i> Control Matrix</h3>
            
            <div class="admin-tab-strip">
                <button class="admin-strip-btn active" onclick="toggleAdminPanel('banners', this)">Banners</button>
                <button class="admin-strip-btn" onclick="toggleAdminPanel('tasks', this)">Campaigns</button>
                <button class="admin-strip-btn" onclick="toggleAdminPanel('proofs', this)">Audits Box</button>
                <button class="admin-strip-btn" onclick="toggleAdminPanel('vouchers', this)">Vouchers</button>
            </div>

            <div id="sub-panel-banners" class="panel-sub-view active">
                <div class="glass-input-group">
                    <label>Upload Banner Artwork</label>
                    <input type="file" id="adm-banner-file" class="glass-input" accept="image/*">
                </div>
                <button class="glass-btn primary" onclick="pushAdminBanner()"><i class="fa-solid fa-circle-plus"></i> Overwrite Banner</button>
            </div>

            <div id="sub-panel-tasks" class="panel-sub-view">
                <div class="glass-input-group"><label>Campaign Title</label><input type="text" id="adm-task-title" class="glass-input"></div>
                <div class="glass-input-group"><label>Bounty Payout (₹)</label><input type="number" id="adm-task-sum" class="glass-input"></div>
                <div class="glass-input-group"><label>Target Uniform Resource Locator</label><input type="text" id="adm-task-url" class="glass-input"></div>
                <div class="glass-input-group"><label>Mission Description Guidelines</label><textarea id="adm-task-desc" class="glass-input" style="height: 60px; resize: none;"></textarea></div>
                <button class="glass-btn primary" onclick="deployNewAdminTask()"><i class="fa-solid fa-bullhorn"></i> Inject Campaign</button>
            </div>

            <div id="sub-panel-proofs" class="panel-sub-view">
                <div id="adm-render-proofs-stack" style="display: flex; flex-direction: column; gap: 12px;"></div>
            </div>

            <div id="sub-panel-vouchers" class="panel-sub-view">
                <div class="glass-input-group"><label>Voucher Code Token Phrase</label><input type="text" id="adm-code-string" class="glass-input" placeholder="PAYLOAD50"></div>
                <div class="glass-input-group"><label>Voucher Credit Payout (₹)</label><input type="number" id="adm-code-sum" class="glass-input" placeholder="50"></div>
                <button class="glass-btn success" onclick="buildSystemVoucher()"><i class="fa-solid fa-floppy-disk"></i> Register Token</button>
            </div>
        </div>
    </div>
</div>

<script>
const SYSTEM_API_ENDPOINT = window.location.origin;
let tgMatrix = window.Telegram.WebApp;
tgMatrix.expand();

let currentSessionUid = tgMatrix.initDataUnsafe?.user?.id || 501889840;
let currentSessionUser = tgMatrix.initDataUnsafe?.user?.first_name || "Premium Node";
let currentSessionPic = tgMatrix.initDataUnsafe?.user?.photo_url || "https://img.icons8.com/colors/344/test-account.png";

let globalEngineState = {};
let activelySelectedTaskId = null;

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById('lbl-profile-uid').innerText = currentSessionUid;
    document.getElementById('lbl-profile-name').innerText = currentSessionUser;
    document.getElementById('img-top-avatar').src = currentSessionPic;
    document.getElementById('img-large-avatar').src = currentSessionPic;
    initializeTelemetrySync();
});

function initializeTelemetrySync() {
    fetch(`${SYSTEM_API_ENDPOINT}/api/settings`)
        .then(res => res.json())
        .then(payload => {
            globalEngineState = payload.botSettings;
            const database = payload.usersDatabase;

            if (currentSessionUid == 501889840 || globalEngineState.subAdmins?.includes(Number(currentSessionUid))) {
                document.getElementById('admin-gate-access').style.display = 'block';
            }

            if (!database[currentSessionUid]) {
                fetch(`${SYSTEM_API_ENDPOINT}/api/mini-app/sync-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentSessionUid, name: currentSessionUser })
                }).then(() => initializeTelemetrySync());
                return;
            }

            const clientData = database[currentSessionUid];
            document.getElementById('lbl-top-bal').innerText = parseFloat(clientData.balance).toFixed(2);
            document.getElementById('lbl-main-bal').innerText = parseFloat(clientData.balance).toFixed(2);

            if (clientData.debt > 0) {
                document.getElementById('indicator-debt').style.display = 'inline';
                document.getElementById('lbl-debt-val').innerText = clientData.debt;
            } else {
                document.getElementById('indicator-debt').style.display = 'none';
            }

            compileSystemBanners(globalEngineState.banners || []);
            compileSystemCampaigns(globalEngineState.tasks || [], clientData.completedTasks || [], globalEngineState.pendingProofs || {});
            renderAdminControlCenter(globalEngineState);
        });
}

function navigateTab(target, tabElement) {
    document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
    document.getElementById(`section-${target}`).classList.add('active');
    tabElement.classList.add('active');
}

function compileSystemBanners(banners) {
    const bannerBox = document.getElementById('wrapper-banner');
    if (banners.length === 0) bannerBox.style.display = 'none';
    else { bannerBox.style.display = 'block'; bannerBox.innerHTML = `<img src="${banners[0]}">`; }
}

function compileSystemCampaigns(tasks, completed, pending) {
    const stream = document.getElementById('list-tasks-dock');
    stream.innerHTML = '';
    tasks.forEach(task => {
        let structuralFlag = "";
        if (completed.includes(task.id)) structuralFlag = `<span style="color:var(--green); font-size:11px; margin-left:6px;">[Cleared]</span>`;
        
        const card = document.createElement('div');
        card.className = 'task-node';
        card.onclick = () => revealCampaignPopup(task, completed, pending);
        card.innerHTML = `
            <div class="task-info-left">
                <span class="task-node-title"><i class="fa-solid fa-hashtag" style="color:var(--blue); margin-right:6px;"></i> ${task.title} ${structuralFlag}</span>
            </div>
            <div class="task-node-payout">₹${task.amount}</div>
        `;
        stream.appendChild(card);
    });
}

function revealCampaignPopup(task, completed, pending) {
    activelySelectedTaskId = task.id;
    document.getElementById('lbl-modal-task-title').innerText = task.title;
    document.getElementById('lbl-modal-task-bounty').innerText = `₹${task.amount}`;
    document.getElementById('lbl-modal-task-desc').innerText = task.desc || "Execute requested milestones to clear allocation parameters.";
    document.getElementById('btn-task-redirect').onclick = () => window.open(task.url, '_blank');

    const cacheKey = `${currentSessionUid}_${task.id}`;
    if (completed.includes(task.id) || pending[cacheKey]) {
        document.getElementById('zone-proof-submission').style.display = 'none';
        document.getElementById('zone-proof-lockout').style.display = 'block';
    } else {
        document.getElementById('zone-proof-submission').style.display = 'block';
        document.getElementById('zone-proof-lockout').style.display = 'none';
    }
    revealModal('popup-task-hub');
}

function uploadVerificationImage() {
    const file = document.getElementById('file-proof-payload').files[0];
    if (!file) return alert("System requires screenshot data vectors.");
    const mappingReader = new FileReader();
    mappingReader.onload = function(event) {
        fetch(`${SYSTEM_API_ENDPOINT}/api/mini-app/submit-proof`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentSessionUid, taskId: activelySelectedTaskId, proofImg: event.target.result })
        }).then(() => { alert("Verification logging complete."); dismissModal('popup-task-hub'); initializeTelemetrySync(); });
    };
    mappingReader.readAsDataURL(file);
}

function triggerRedeemAction() {
    const payloadCode = document.getElementById('input-voucher-code').value.trim();
    if(!payloadCode) return;
    fetch(`${SYSTEM_API_ENDPOINT}/api/mini-app/redeem-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentSessionUid, code: payloadCode })
    }).then(res => res.json()).then(response => {
        if(response.error) alert(response.error);
        else { alert(`Matrix Verified! Added ₹${response.amount}`); initializeTelemetrySync(); }
    });
}

function submitWithdrawalRequest() {
    const accountUPI = document.getElementById('txt-payout-upi').value.trim();
    const sumAmount = parseFloat(document.getElementById('txt-payout-sum').value);
    fetch(`${SYSTEM_API_ENDPOINT}/api/mini-app/withdraw`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentSessionUid, upi: accountUPI, amount: sumAmount })
    }).then(res => res.json()).then(response => {
        if(response.error) alert(response.error);
        else { alert("Payout clearing sequence queued."); dismissModal('popup-payout'); initializeTelemetrySync(); }
    });
}

function executeP2PTransfer() {
    const recipientUID = document.getElementById('pay-target-id').value.trim();
    const transferQuantum = parseFloat(document.getElementById('pay-target-amount').value);
    fetch(`${SYSTEM_API_ENDPOINT}/api/mini-app/peer-transfer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sourceId: currentSessionUid, targetId: recipientUID, amount: transferQuantum })
    }).then(res => res.json()).then(response => {
        if(response.error) alert(response.error);
        else { alert("P2P Assets disbursed successfully."); initializeTelemetrySync(); }
    });
}

function openSecureAdminGate() {
    revealModal('popup-admin-terminal');
    document.getElementById('layer-hardware-lock').style.display = 'flex';
    document.getElementById('layer-admin-dashboard').style.display = 'none';
}

function unlockControlDashboard() {
    document.getElementById('layer-hardware-lock').style.display = 'none';
    document.getElementById('layer-admin-dashboard').style.display = 'block';
}

function toggleAdminPanel(subViewTab, tabBtn) {
    document.querySelectorAll('.panel-sub-view').forEach(view => view.classList.remove('active'));
    document.querySelectorAll('.admin-strip-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`sub-panel-${subViewTab}`).classList.add('active');
    tabBtn.classList.add('active');
}

function pushAdminBanner() {
    const structuralFile = document.getElementById('adm-banner-file').files[0];
    if(!structuralFile) return;
    const processingReader = new FileReader();
    processingReader.onload = function(e) {
        fetch(`${SYSTEM_API_ENDPOINT}/api/settings/update`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ banners: [e.target.result] })
        }).then(() => { alert("Artworks matrix refreshed."); initializeTelemetrySync(); });
    };
    processingReader.readAsDataURL(structuralFile);
}

function deployNewAdminTask() {
    const title = document.getElementById('adm-task-title').value;
    const amount = document.getElementById('adm-task-sum').value;
    const url = document.getElementById('adm-task-url').value;
    const desc = document.getElementById('adm-task-desc').value;
    let stack = globalEngineState.tasks || [];
    stack.push({ id: Date.now().toString(), title, amount, url, desc });
    fetch(`${SYSTEM_API_ENDPOINT}/api/settings/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tasks: stack })
    }).then(() => { alert("New Campaign injected."); initializeTelemetrySync(); });
}

function buildSystemVoucher() {
    const rawPhrase = document.getElementById('adm-code-string').value.trim();
    const tokenBounty = document.getElementById('adm-code-sum').value;
    fetch(`${SYSTEM_API_ENDPOINT}/api/admin/create-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ codeString: rawPhrase, awardValue: tokenBounty })
    }).then(() => { alert("Voucher node registered."); initializeTelemetrySync(); });
}

function renderAdminControlCenter(settings) {
    const auditStackView = document.getElementById('adm-render-proofs-stack');
    auditStackView.innerHTML = '';
    const pendingProofs = settings.pendingProofs || {};
    Object.keys(pendingProofs).forEach(keyId => {
        const structuralRecord = pendingProofs[keyId];
        const auditCard = document.createElement('div');
        auditCard.style.cssText = "background:rgba(255,255,255,0.02); border:1px solid var(--glass-border); padding:12px; border-radius:14px;";
        auditCard.innerHTML = `
            <p style="font-size:12px; color:var(--text-muted)">User Node: ${structuralRecord.userId} | Mission ID: ${structuralRecord.taskId}</p>
            <img src="${structuralRecord.proofImg}" style="width:100%; max-height:140px; object-fit:contain; margin:10px 0; border-radius:8px;">
            <div style="display:flex; gap:10px;">
                <button class="glass-btn success" style="padding:6px; font-size:13px;" onclick="adjudicateAuditLog('${keyId}', true)">Approve</button>
                <button class="glass-btn" style="padding:6px; font-size:13px; color:var(--danger); border-color:rgba(231,76,60,0.3);" onclick="adjudicateAuditLog('${keyId}', false)">Reject</button>
            </div>
        `;
        auditStackView.appendChild(auditCard);
    });
}

function adjudicateAuditLog(targetKey, evaluationFlag) {
    fetch(`${SYSTEM_API_ENDPOINT}/api/admin/judge-proof`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ proofKey: targetKey, approve: evaluationFlag })
    }).then(() => initializeTelemetrySync());
}

function revealModal(id) { document.getElementById(id).style.display = 'flex'; }
function dismissModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
